<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sponsor Dashboard</title>
  <link rel="icon" type="image/png" href="/images/favicon.png" />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #06090F;
      color: #E2E8F0;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
    }

    input:focus {
      border-color: #4F8FF7 !important;
      outline: none;
    }

    ::placeholder {
      color: #4A5A72;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #0C1018;
    }

    ::-webkit-scrollbar-thumb {
      background: #1B2233;
      border-radius: 3px;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeIn 0.3s ease;
    }

    a {
      color: inherit;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const KEYS = { config: "bh-config", sponsors: "bh-sponsors", runs: "bh-runs", contracts: "bh-contracts", token: "bh-admin-token", publishTimes: "bh-publish-times" };
    const store = {
      get(k) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
      set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) { console.error(e); } },
    };

    const uid = () => Math.random().toString(36).slice(2, 10);
    const num = (n) => (n || 0).toLocaleString();
    const pct = (n) => (n || 0).toFixed(2) + "%";
    const fmtDate = (d) => { if (!d) return "—"; return new Date(d).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }); };
    const tsToDate = (ts) => { if (!ts) return null; return new Date(ts * 1000).toISOString().split("T")[0]; };
    const money = (n) => "$" + (n || 0).toFixed(2);
    const getTerms = (ct) => { const t = []; if (ct.exclusivePlacement) t.push("Exclusive Placement"); if (ct.primaryPlacement) t.push("Primary Placement"); if (ct.categoryExclusivity) t.push("Category Exclusivity"); if (ct.pricingNotes?.trim()) t.push(ct.pricingNotes.trim()); return t; };
    const getRunClicks = (r) => r.useVerified ? (r.verifiedClicks || 0) : (r.totalClicks || 0);

    // ─── Responsive breakpoints & hook ──────────────────────────────
    const MOBILE = 640;
    const TABLET = 1024;
    function useWindowWidth() {
      const [w, setW] = useState(window.innerWidth);
      useEffect(() => {
        let raf;
        const h = () => { cancelAnimationFrame(raf); raf = requestAnimationFrame(() => setW(window.innerWidth)); };
        window.addEventListener("resize", h);
        return () => { window.removeEventListener("resize", h); cancelAnimationFrame(raf); };
      }, []);
      return w;
    }

    // ─── Relative time + sync helpers ───────────────────────────────
    function timeAgo(iso) {
      if (!iso) return null;
      const sec = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
      if (sec < 120) return "just now";
      const min = Math.floor(sec / 60);
      if (min < 60) return `${min} minutes ago`;
      const hrs = Math.floor(min / 60);
      if (hrs < 24) return `${hrs} hour${hrs > 1 ? "s" : ""} ago`;
      const days = Math.floor(hrs / 24);
      if (days === 1) return "yesterday";
      if (days <= 7) return `${days} days ago`;
      return new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }
    function getLatestSync(runs) {
      let latest = null;
      for (const r of runs) { if (r.lastSync && (!latest || r.lastSync > latest)) latest = r.lastSync; }
      return latest;
    }
    function isSyncStale(iso) { return iso ? Date.now() - new Date(iso).getTime() > 24 * 60 * 60 * 1000 : false; }

    // ─── Routing ──────────────────────────────────────────────────
    function getRoute() {
      const path = window.location.pathname;
      const m = path.match(/^\/s\/([A-Za-z0-9]+)$/);
      if (m) {
        if (m[1] === "demo") return { mode: "demo" };
        return { mode: "sponsor", shareToken: m[1] };
      }
      return { mode: "admin" };
    }

    const C = { bg: "#06090F", surface: "#0C1018", card: "#111722", border: "#1B2233", accent: "#4F8FF7", accentDim: "rgba(79,143,247,0.10)", green: "#34D399", greenDim: "rgba(52,211,153,0.10)", amber: "#FBBF24", amberDim: "rgba(251,191,36,0.10)", red: "#F87171", redDim: "rgba(248,113,113,0.10)", purple: "#A78BFA", purpleDim: "rgba(167,139,250,0.10)", text: "#E2E8F0", muted: "#8494AB", dim: "#4A5A72", white: "#FFFFFF" };
    const FONT = "'Outfit',sans-serif";
    const MONO = "'IBM Plex Mono',monospace";

    // ─── Get patterns array from sponsor (handles old single-pattern format) ─────
    function getPatterns(sponsor) {
      if (sponsor.urlPatterns && sponsor.urlPatterns.length > 0) return sponsor.urlPatterns;
      if (sponsor.urlPattern) return [sponsor.urlPattern];
      return [];
    }

    // ─── Beehiiv API ─────────────────────────────────────────────────
    async function fetchAllPosts(apiKey, pubId, maxPages = 5, token) {
      const res = await fetch("/api/sync", {
        method: "POST",
        headers: { "Content-Type": "application/json", ...(token ? { "Authorization": `Bearer ${token}` } : {}) },
        body: JSON.stringify({ apiKey, pubId, maxPages }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
        throw new Error(err.error || `API error ${res.status}`);
      }
      return res.json();
    }

    async function fetchQuickSync(apiKey, pubId, knownPostIds, token) {
      const res = await fetch("/api/quick-sync", {
        method: "POST",
        headers: { "Content-Type": "application/json", ...(token ? { "Authorization": `Bearer ${token}` } : {}) },
        body: JSON.stringify({ apiKey, pubId, knownPostIds }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
        throw new Error(err.error || `API error ${res.status}`);
      }
      return await res.json();
    }

    function extractRun(post, patterns) {
      if (!post.stats) return null;
      const es = post.stats.email || {};
      const clicks = post.stats.clicks || [];
      let sc = 0, vc = 0, matched = [];
      for (const e of clicks) {
        const u = (e.url || e.base_url || "").toLowerCase();
        const hit = patterns.some(p => p && u.includes(p.toLowerCase()));
        if (hit) {
          sc += e.total_clicks || 0;
          vc += e.email?.verified_clicks || 0;
          matched.push({ url: e.url || e.base_url, clicks: e.total_clicks || 0, verifiedClicks: e.email?.verified_clicks || 0 });
        }
      }
      if (sc === 0) return null;
      return {
        postId: post.id,
        emailName: post.title || post.subject_line || "Untitled",
        webUrl: post.web_url || null,
        sendDate: tsToDate(post.publish_date) || tsToDate(post.created),
        totalOpens: es.opens || 0,
        totalClicks: sc,
        verifiedClicks: vc,
        matchedUrls: matched,
        recipients: es.recipients || 0,
        autoSynced: true,
      };
    }

    // ═══════════════════════════════════════════════════════════════
    // LOGIN SCREEN
    // ═══════════════════════════════════════════════════════════════
    function LoginScreen({ onLogin }) {
      const [pw, setPw] = useState("");
      const [err, setErr] = useState(null);
      const [loading, setLoading] = useState(false);
      const submit = async () => {
        if (!pw.trim()) return;
        setLoading(true); setErr(null);
        try {
          const res = await fetch("/api/auth", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ password: pw }) });
          const data = await res.json();
          if (!res.ok) { setErr(data.error || "Login failed"); return; }
          onLogin(data.token);
        } catch (e) { setErr("Connection error"); }
        finally { setLoading(false); }
      };
      return (
        <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: C.bg }}>
          <div style={{ width: 360, maxWidth: "90vw", textAlign: "center" }}>
            <div style={{ width: 48, height: 48, borderRadius: 14, background: `linear-gradient(135deg,${C.accent},#8B5CF6)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, color: "#fff", fontWeight: 700, margin: "0 auto 24px" }}>S</div>
            <h1 style={{ fontSize: 22, fontWeight: 700, marginBottom: 8 }}>Sponsor Dashboard</h1>
            <p style={{ fontSize: 13, color: C.dim, marginBottom: 32 }}>Enter your admin password to continue</p>
            <input type="password" value={pw} onChange={e => setPw(e.target.value)} onKeyDown={e => e.key === "Enter" && submit()} placeholder="Password" autoFocus
              style={{ width: "100%", padding: "14px 18px", background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, color: C.text, fontFamily: FONT, fontSize: 15, marginBottom: 16, boxSizing: "border-box", textAlign: "center" }} />
            {err && <p style={{ color: C.red, fontSize: 13, marginBottom: 12 }}>{err}</p>}
            <Btn onClick={submit} color={C.white} bg={C.accent} disabled={loading} style={{ width: "100%", padding: "14px", fontSize: 15 }}>{loading ? "Signing in..." : "Sign In"}</Btn>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    function App() {
      const [authToken, setAuthToken] = useState(() => store.get(KEYS.token));
      const login = (t) => { setAuthToken(t); store.set(KEYS.token, t); };
      const logout = () => { setAuthToken(null); store.set(KEYS.token, null); };

      // Check token expiry on mount
      useEffect(() => {
        if (authToken) {
          try {
            const payload = JSON.parse(atob(authToken.split(".")[0].replace(/-/g,"+").replace(/_/g,"/")));
            if (payload.exp && Date.now() > payload.exp) logout();
          } catch { logout(); }
        }
      }, []);

      const [config, setConfig] = useState(() => store.get(KEYS.config) || { apiKey: "", pubId: "" });
      const [sponsors, setSponsors] = useState(() => store.get(KEYS.sponsors) || []);
      const [runs, setRuns] = useState(() => store.get(KEYS.runs) || []);
      const [sel, setSel] = useState(null);
      const [view, setView] = useState("admin");
      const [syncing, setSyncing] = useState(false);
      const [syncMsg, setSyncMsg] = useState(null);
      const [modal, setModal] = useState(null);
      const [inquiries, setInquiries] = useState([]);
      const [inquiryFilter, setInquiryFilter] = useState("new");
      const [toast, setToast] = useState(null);
      const [convertInquiry, setConvertInquiry] = useState(null);
      const [editRun, setEditRun] = useState(null);
      const [syncDepth, setSyncDepth] = useState(5);
      const [contracts, setContracts] = useState(() => store.get(KEYS.contracts) || []);
      const [selContract, setSelContract] = useState(null);
      const [downloading, setDownloading] = useState(false);
      const [publishTimes, setPublishTimes] = useState(() => store.get(KEYS.publishTimes) || {});
      const width = useWindowWidth();
      const isMobile = width <= MOBILE;
      const isTablet = width <= TABLET;
      const [, setAdminTick] = useState(0);
      useEffect(() => { const i = setInterval(() => setAdminTick(t => t + 1), 60000); return () => clearInterval(i); }, []);
      const [pricingCfg, setPricingCfg] = useState(null);
      useEffect(() => {
        Promise.all([
          fetch("/api/pricing-config").then(r => r.ok ? r.json() : null).catch(() => null),
          fetch("/api/newsletter-opens").then(r => r.ok ? r.json() : null).catch(() => null),
          fetch("/api/stats").then(r => r.ok ? r.json() : null).catch(() => null),
        ]).then(([pc, opens, stats]) => {
          const defaults = { anchorCPM: 45, starterDiscountPct: 0.50, growthDiscountPct: 0.55, partnerDiscountPct: 0.60, starterPlacements: 6, growthPlacements: 12, partnerPlacements: 24, starterMonths: 3, growthMonths: 6, partnerMonths: 12, takeoverPremiumPct: 0.20, takeoverPerEmail: null, roundToNearest: 500, starterPriceOverride: null, growthPriceOverride: null, partnerPriceOverride: null, starterPolls: 0, growthPolls: 1, partnerPolls: 3, subscriberOffset: 3000 };
          const cfg = { ...defaults, ...(pc || {}) };
          const engagedMoms = (stats?.engagedMoms || 29000) + (cfg.subscriberOffset || 3000);
          const avgOpens = opens?.avgOpensPerSend || null;
          const anchor = ((avgOpens || engagedMoms) / 1000) * cfg.anchorCPM;
          const r = cfg.roundToNearest || 1;
          const starterPrice = cfg.starterPriceOverride || Math.round((cfg.starterPlacements * anchor * (1 - cfg.starterDiscountPct)) / r) * r;
          const growthPrice = cfg.growthPriceOverride || Math.round((cfg.growthPlacements * anchor * (1 - cfg.growthDiscountPct)) / r) * r;
          const partnerPrice = cfg.partnerPriceOverride || Math.round((cfg.partnerPlacements * anchor * (1 - cfg.partnerDiscountPct)) / r) * r;
          const takeoverPerEmail = cfg.takeoverPerEmail || Math.ceil((anchor * cfg.takeoverPremiumPct) / 25) * 25;
          setPricingCfg({ ...cfg, starterPrice, growthPrice, partnerPrice, takeoverPerEmail });
        });
      }, []);

      // Auth gate
      if (!authToken) return <LoginScreen onLogin={login} />;

      const saveCfg = (c) => { setConfig(c); store.set(KEYS.config, c); };
      const saveSp = (s) => { setSponsors(s); store.set(KEYS.sponsors, s); };
      const savePt = (pt) => { setPublishTimes(pt); store.set(KEYS.publishTimes, pt); };
      const saveRn = (r) => { setRuns(r); store.set(KEYS.runs, r); };
      const saveCt = (ct) => { setContracts(ct); store.set(KEYS.contracts, ct); };

      // Migrate sponsors without shareToken
      useEffect(() => {
        if (sponsors.some(s => !s.shareToken)) {
          saveSp(sponsors.map(s => s.shareToken ? s : { ...s, shareToken: uid() + uid() }));
        }
      }, []);

      // Sponsor CRUD
      const addSponsor = (name, patterns, contractData) => {
        const s = { id: uid(), name, urlPatterns: patterns.filter(p => p.trim()), created: new Date().toISOString(), shareToken: uid() + uid() };
        saveSp([...sponsors, s]);
        if (contractData) {
          const updated = contracts.map(c => c.sponsorId === s.id ? { ...c, isActive: false } : c);
          const nc = { id: uid(), sponsorId: s.id, name: contractData.contractName, totalPrice: contractData.totalPrice, totalRuns: contractData.totalRuns, startDate: contractData.startDate, endDate: contractData.endDate, packageTier: contractData.packageTier || "custom", pollsIncluded: contractData.pollsIncluded || 0, takeoverIncluded: contractData.takeoverIncluded || false, isActive: true, created: new Date().toISOString() };
          saveCt([...updated, nc]);
          setSelContract(nc.id);
        }
        setSel(s.id);
        setModal(null);
      };
      const updateSponsor = (id, updates) => {
        saveSp(sponsors.map(s => s.id === id ? { ...s, ...updates } : s));
      };
      const delSponsor = (id) => {
        if (!confirm("Delete sponsor and all runs?")) return;
        saveSp(sponsors.filter(s => s.id !== id));
        saveRn(runs.filter(r => r.sponsorId !== id));
        saveCt(contracts.filter(c => c.sponsorId !== id));
        if (sel === id) { setSel(null); setSelContract(null); }
      };

      // Run CRUD
      const addRunManual = (d) => { saveRn([...runs, { id: uid(), ...d }]); setModal(null); };
      const updateRunManual = (id, u) => { saveRn(runs.map(r => r.id === id ? { ...r, ...u } : r)); setModal(null); setEditRun(null); };
      const delRun = (id) => { if (confirm("Delete run?")) saveRn(runs.filter(r => r.id !== id)); };
      const toggleRunVerified = (id) => { saveRn(runs.map(r => r.id === id ? { ...r, useVerified: !r.useVerified } : r)); };

      // Contract CRUD
      const addContract = (data) => {
        const updated = contracts.map(c => c.sponsorId === data.sponsorId ? { ...c, isActive: false } : c);
        const nc = { id: uid(), ...data, isActive: true, created: new Date().toISOString() };
        saveCt([...updated, nc]);
        setSelContract(nc.id);
        setModal(null);
      };
      const updateContract = (id, updates) => {
        saveCt(contracts.map(c => c.id === id ? { ...c, ...updates } : c));
        setModal(null);
      };
      const delContract = (id) => {
        if (!confirm("Delete contract? Runs will become unassigned.")) return;
        saveRn(runs.map(r => r.contractId === id ? { ...r, contractId: null } : r));
        saveCt(contracts.filter(c => c.id !== id));
        if (selContract === id) setSelContract(null);
      };
      const activateContract = (id) => {
        const ct = contracts.find(c => c.id === id);
        if (!ct) return;
        saveCt(contracts.map(c => c.sponsorId === ct.sponsorId ? { ...c, isActive: c.id === id } : c));
        setSelContract(id);
      };

      // ─── Inquiries ────
      const fetchInquiries = useCallback(async () => {
        if (!authToken) return;
        try {
          const res = await fetch("/api/inquiry", { headers: { Authorization: `Bearer ${authToken}` } });
          if (res.ok) { const data = await res.json(); setInquiries(Array.isArray(data) ? data : []); }
        } catch {}
      }, [authToken]);

      useEffect(() => { fetchInquiries(); }, [fetchInquiries]);

      const patchInquiry = async (id, updates) => {
        if (!authToken) return;
        try {
          await fetch("/api/inquiry", {
            method: "PATCH",
            headers: { "Content-Type": "application/json", Authorization: `Bearer ${authToken}` },
            body: JSON.stringify({ id, ...updates }),
          });
          await fetchInquiries();
        } catch {}
      };

      const dismissInquiry = (inq) => {
        patchInquiry(inq.id, { status: "dismissed", dismissedAt: new Date().toISOString() });
        const toastId = Date.now();
        setToast({ id: toastId, message: "Inquiry dismissed", undoId: inq.id });
        setTimeout(() => setToast(t => t && t.id === toastId ? null : t), 5000);
      };

      const undoDismiss = (id) => {
        patchInquiry(id, { status: "new", dismissedAt: null });
        setToast(null);
      };

      const newInquiryCount = inquiries.filter(i => (i.status || "new") === "new").length;

      // ─── Sync logic ────
      const processResults = (allPosts, sponsorIds, currentRuns) => {
        let nw = 0, up = 0, list = [...currentRuns];
        for (const sid of sponsorIds) {
          const sp = sponsors.find(s => s.id === sid);
          if (!sp) continue;
          const patterns = getPatterns(sp);
          if (patterns.length === 0) continue;
          const existing = new Set(list.filter(r => r.sponsorId === sid).map(r => r.postId));
          for (const p of allPosts) {
            const ex = extractRun(p, patterns);
            if (!ex) continue;
            if (existing.has(p.id)) {
              list = list.map(r => r.sponsorId === sid && r.postId === p.id
                ? { ...r, totalOpens: ex.totalOpens, totalClicks: ex.totalClicks, verifiedClicks: ex.verifiedClicks, matchedUrls: ex.matchedUrls, recipients: ex.recipients, webUrl: ex.webUrl, lastSync: new Date().toISOString() }
                : r);
              up++;
            } else {
              const newRun = { id: uid(), sponsorId: sid, ...ex, contractId: null, useVerified: false, lastSync: new Date().toISOString() };
              // Auto-assign to active contract if it has capacity
              const ac = contracts.find(c => c.sponsorId === sid && c.isActive);
              if (ac) {
                const assigned = list.filter(r => r.contractId === ac.id).length;
                if (assigned < ac.totalRuns) newRun.contractId = ac.id;
              }
              list.push(newRun);
              nw++;
            }
          }
        }
        return { list, nw, up };
      };

      // Full sync with depth control
      // ─── Publish sponsor data to KV ────────────────────────────
      const publishSponsor = async (sponsorId, currentRuns) => {
        const sp = sponsors.find(s => s.id === sponsorId);
        if (!sp || !sp.shareToken || !authToken) return;
        const spContracts = contracts.filter(c => c.sponsorId === sponsorId);
        const spRuns = (currentRuns || runs).filter(r => r.sponsorId === sponsorId);
        const cleanRun = (r) => ({ id: r.id, emailName: r.emailName, sendDate: r.sendDate, totalOpens: r.totalOpens, totalClicks: getRunClicks(r), webUrl: r.webUrl || null, description: r.description || null });
        const pubContracts = spContracts.map(c => {
          const cRuns = [...spRuns.filter(r => r.contractId === c.id)].sort((a, b) => new Date(b.sendDate) - new Date(a.sendDate)).map(cleanRun);
          const sCpm = c.showCpmToSponsor ?? c.showPricingToSponsor ?? false;
          const sCpc = c.showCpcToSponsor ?? c.showPricingToSponsor ?? false;
          let cm = null;
          if (c.totalPrice > 0 && (sCpm || sCpc)) {
            const tO = cRuns.reduce((s, r) => s + (r.totalOpens || 0), 0);
            const tC = cRuns.reduce((s, r) => s + (r.totalClicks || 0), 0);
            const spent = (cRuns.length / c.totalRuns) * c.totalPrice;
            cm = {};
            if (sCpm) cm.cpm = tO > 0 ? (spent / tO) * 1000 : 0;
            if (sCpc) cm.cpc = tC > 0 ? spent / tC : 0;
          }
          const totalSpent = c.totalPrice > 0 ? (cRuns.length / c.totalRuns) * c.totalPrice : 0;
          return { id: c.id, name: c.name, totalRuns: c.totalRuns, totalSpent, startDate: c.startDate, endDate: c.endDate,
            isActive: !!c.isActive, showCpmToSponsor: sCpm, showCpcToSponsor: sCpc,
            exclusivePlacement: c.exclusivePlacement, primaryPlacement: c.primaryPlacement,
            categoryExclusivity: c.categoryExclusivity, pricingNotes: c.pricingNotes,
            packageTier: c.packageTier || "custom", pollsIncluded: c.pollsIncluded || 0, takeoverIncluded: c.takeoverIncluded || false,
            runs: cRuns, costMetrics: cm };
        });
        const assignedIds = new Set(spContracts.map(c => c.id));
        const unassignedRuns = [...spRuns.filter(r => !r.contractId || !assignedIds.has(r.contractId))].sort((a, b) => new Date(b.sendDate) - new Date(a.sendDate)).map(r => ({ ...cleanRun(r), price: r.price || 0 }));
        const pubData = {
          id: sponsorId, sponsorName: sp.name, showCostToSponsor: !!sp.showCostToSponsor, oneOffShowCpm: !!sp.oneOffShowCpm, oneOffShowCpc: !!sp.oneOffShowCpc, contracts: pubContracts, unassignedRuns,
          publishedAt: new Date().toISOString(), publicationName: config.publicationName || "", publicationUrl: config.publicationUrl || "", campaignUrl: config.campaignUrl || "",
        };
        try {
          const res = await fetch("/api/publish", { method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${authToken}` }, body: JSON.stringify({ shareToken: sp.shareToken, data: pubData }) });
          if (res.ok) savePt({ ...publishTimes, [sponsorId]: new Date().toISOString() });
        } catch (e) { console.error("Publish failed:", e); }
      };

      const doSync = async (sponsorIds, pages = syncDepth) => {
        if (!config.apiKey || !config.pubId) { setSyncMsg({ t: "err", m: "Set API key & Pub ID in Settings first." }); return; }
        setSyncing(true); setSyncMsg(null);
        try {
          const data = await fetchAllPosts(config.apiKey, config.pubId, pages, authToken);
          const allPosts = data.posts || [];
          const { list, nw, up } = processResults(allPosts, sponsorIds, runs);
          saveRn(list);
          for (const sid of sponsorIds) publishSponsor(sid, list);

          if (data.warning) msg += ` ⚠️ ${data.warning}`;
          setSyncMsg({ t: "ok", m: msg });
        } catch (e) {
          if (e.message.includes("Unauthorized")) { logout(); return; }
          setSyncMsg({ t: "err", m: `Failed: ${e.message}` });
        } finally { setSyncing(false); }
      };

      // Quick sync for background auto-refresh
      const doQuickSync = async (sponsorIds, silent = false) => {
        if (!config.apiKey || !config.pubId) return;
        if (syncing) return;
        if (!silent) setSyncing(true);
        try {
          const knownPostIds = [...new Set(runs.filter(r => sponsorIds.includes(r.sponsorId) && r.postId).map(r => r.postId))];
          const data = await fetchQuickSync(config.apiKey, config.pubId, knownPostIds, authToken);
          const allPosts = data.posts || [];
          const { list, nw, up } = processResults(allPosts, sponsorIds, runs);
          saveRn(list);
          if (nw > 0 || up > 0) { for (const sid of sponsorIds) publishSponsor(sid, list); }
          if (!silent && (nw > 0 || up > 0)) setSyncMsg({ t: "ok", m: `Quick sync: ${nw} new, ${up} updated.` });
        } catch (e) {
          if (e.message.includes("Unauthorized")) { logout(); return; }
          if (!silent) setSyncMsg({ t: "err", m: `Quick sync failed: ${e.message}` });
        } finally { if (!silent) setSyncing(false); }
      };

      const syncOne = (sid, pages) => doSync([sid], pages);
      const syncAll = () => doSync(sponsors.map(s => s.id), syncDepth);

      // Derived
      const sponsor = sponsors.find(s => s.id === sel);

          costPerRun: viewingContract.totalPrice / viewingContract.totalRuns,

        svTot.ctr = svTot.opens > 0 ? (svTot.clicks / svTot.opens) * 100 : 0;
        const svCostMetrics = svContract && svContract.totalPrice > 0 ? (() => {
          const spent = (svRuns.length / svContract.totalRuns) * svContract.totalPrice;
          return {
            cpm: svTot.opens > 0 ? (spent / svTot.opens) * 1000 : 0,

            <div style={{ flex: 1, overflow: "auto", padding: "12px 0 4px" }}>

                const pats = getPatterns(s);
                return (
                  <div key={s.id} onClick={() => { setSel(s.id); setView("admin"); setSelContract(null); setModal(null); setEditRun(null); setSyncMsg(null); }}
                    style={{ padding: "14px 20px", cursor: "pointer", background: sel === s.id ? C.accentDim : "transparent", borderLeft: `3px solid ${sel === s.id ? C.accent : "transparent"}`, transition: "all 0.12s" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <p style={{ fontSize: 14, fontWeight: sel === s.id ? 600 : 400, color: sel === s.id ? C.white : C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{s.name}</p>
                      {cnt > 0 && <span style={{ fontSize: 10, padding: "2px 7px", borderRadius: 10, background: C.accentDim, color: C.accent, fontWeight: 600 }}>{cnt}</span>}
                    </div>
                    <p style={{ fontSize: 10, color: C.dim, margin: "3px 0 0", fontFamily: MONO }}>{pats.length} pattern{pats.length !== 1 ? "s" : ""}</p>
                  </div>
                );
              })}
              {sponsors.length === 0 && <p style={{ fontSize: 12, color: C.dim, padding: "24px 20px", textAlign: "center" }}>Add a sponsor to get started</p>}
            </div>
          </aside>
          )}

          {/* Main */}
          <main style={{ flex: 1, padding: isMobile ? 16 : 32, overflow: "auto" }}>
            {!sel && view !== "inquiries" && view !== "polls" && (
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100%", flexDirection: "column", gap: 16 }}>
                <div style={{ width: 64, height: 64, borderRadius: 16, background: C.card, border: `1px solid ${C.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28 }}>📊</div>
                <p style={{ color: C.dim, fontSize: 15, fontWeight: 500 }}>Select a sponsor to view their data</p>
                {!config.apiKey && <Btn onClick={() => setModal("settings")} color={C.accent} bg={C.accentDim}>Connect Beehiiv API →</Btn>}
              </div>
            )}

            {view === "inquiries" && !sel && (() => {
              const tierLabel = { starter: "Starter", growth: "Growth", partner: "Partner" };
              const statusColor = { new: C.green, dismissed: C.dim, converted: C.accent };
              const filtered = inquiries
                .map(i => ({ ...i, status: i.status || "new" }))
                .filter(i => inquiryFilter === "all" || i.status === inquiryFilter)
                .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
              const allNew = inquiries.filter(i => (i.status || "new") === "new");

              return (
                <div className="fade-in">
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24, flexWrap: "wrap", gap: 12 }}>
                    <h2 style={{ fontSize: isMobile ? 20 : 26, fontWeight: 700, letterSpacing: -0.5 }}>Inquiries</h2>
                  </div>

                  {/* Filter tabs */}
                  <div style={{ display: "flex", gap: 6, marginBottom: 24, flexWrap: "wrap" }}>
                    {[["new", "New"], ["all", "All"], ["dismissed", "Dismissed"], ["converted", "Converted"]].map(([key, label]) => (
                      <button key={key} onClick={() => setInquiryFilter(key)} style={{
                        padding: "7px 16px", borderRadius: 8, fontSize: 13, fontWeight: 600, fontFamily: FONT,

                        background: inquiryFilter === key ? C.accentDim : C.card,

                  {inquiries.length === 0 && (
                    <div style={{ textAlign: "center", padding: "64px 24px" }}>
                      <div style={{ width: 64, height: 64, borderRadius: 16, background: C.card, border: `1px solid ${C.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, margin: "0 auto 16px" }}>📬</div>
                      <p style={{ color: C.dim, fontSize: 15, fontWeight: 500, lineHeight: 1.6 }}>No inquiries yet. When sponsors submit the form<br/>on your packages page, they'll appear here.</p>
                    </div>

                  {inquiries.length > 0 && filtered.length === 0 && inquiryFilter === "new" && (
                    <div style={{ textAlign: "center", padding: "64px 24px" }}>
                      <p style={{ color: C.dim, fontSize: 15, fontWeight: 500, marginBottom: 12 }}>All caught up — no new inquiries.</p>
                      <button onClick={() => setInquiryFilter("all")} style={{ background: "none", border: "none", color: C.accent, cursor: "pointer", fontFamily: FONT, fontSize: 13, fontWeight: 600 }}>View all inquiries →</button>
                    </div>

                  {inquiries.length > 0 && filtered.length === 0 && inquiryFilter !== "new" && inquiryFilter !== "all" && (
                    <div style={{ textAlign: "center", padding: "64px 24px" }}>
                      <p style={{ color: C.dim, fontSize: 15, fontWeight: 500 }}>No {inquiryFilter} inquiries.</p>
                    </div>
                  )}

                  {/* Inquiry cards */}
                  <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                    {filtered.map(inq => (
                      <InquiryCard key={inq.id} inq={inq} isMobile={isMobile} tierLabel={tierLabel} statusColor={statusColor}
                        onDismiss={() => dismissInquiry(inq)}
                        onConvert={() => { setConvertInquiry(inq); setModal("convertInquiry"); }}
                        onMoveToNew={() => patchInquiry(inq.id, { status: "new", dismissedAt: null })}
                      />
                    ))}

                </div>

            {view === "polls" && !sel && <PollCalendar authToken={authToken} sponsors={sponsors} contracts={contracts} isMobile={isMobile} />}

            {sel && sponsor && (
              <div className="fade-in">

                  </div>
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
                    {sRuns.length > 0 && <button onClick={() => { setDownloading(true); try { downloadReport({ sponsor, contract: viewingContract, runs: sRuns, totals: tot, costMetrics, config }); } catch(e) { console.error(e); } setTimeout(() => setDownloading(false), 1000); }} disabled={downloading} style={{ background: "none", border: `1px solid ${C.border}`, borderRadius: 8, color: downloading ? C.dim : C.muted, cursor: downloading ? "not-allowed" : "pointer", fontFamily: FONT, fontSize: 12, fontWeight: 600, padding: "8px 14px", opacity: downloading ? 0.6 : 1 }}>{downloading ? "Opening..." : "↓ Download Report"}</button>}

                  </div>

                </div>

                      <span style={{ fontSize: 12, fontFamily: MONO, color: C.muted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1 }}>{window.location.origin}/s/{sponsor.shareToken}</span>

              <span style={{ fontSize: 13, color: C.text }}>{toast.message}</span>
              <button onClick={() => undoDismiss(toast.undoId)} style={{ background: "none", border: "none", color: C.accent, cursor: "pointer", fontFamily: FONT, fontSize: 13, fontWeight: 600 }}>Undo</button>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // POLL CALENDAR
    // ═══════════════════════════════════════════════════════════════
    function PollCalendar({ authToken, sponsors, contracts, isMobile }) {
      const [pollConfig, setPollConfig] = useState({ sendDays: [1, 3, 5] });
      const [schedules, setSchedules] = useState({});
      const [currentMonth, setCurrentMonth] = useState(() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`; });
      const [selectedDate, setSelectedDate] = useState(null);
      const [viewMode, setViewMode] = useState("calendar"); // calendar | list
      const [loading, setLoading] = useState(true);
      const [filterSponsor, setFilterSponsor] = useState("");
      const [filterStatus, setFilterStatus] = useState("");

      const dayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
      const dayLabels = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

      const fetchConfig = async () => {
        try {
          const res = await fetch("/api/polls?action=config", { headers: { Authorization: `Bearer ${authToken}` } });
          if (res.ok) { const d = await res.json(); setPollConfig(d); }
        } catch {}
      };

      const fetchSchedules = async (month) => {
        try {
          const res = await fetch(`/api/polls?action=schedule&month=${month}`, { headers: { Authorization: `Bearer ${authToken}` } });
          if (res.ok) { const d = await res.json(); setSchedules(d); }
        } catch {}
      };

      useEffect(() => { fetchConfig().then(() => fetchSchedules(currentMonth)).then(() => setLoading(false)); }, []);
      useEffect(() => { fetchSchedules(currentMonth); }, [currentMonth]);

      const saveSendDays = async (days) => {
        setPollConfig({ ...pollConfig, sendDays: days });
        await fetch("/api/polls?action=config", { method: "POST", headers: { "Content-Type": "application/json", Authorization: `Bearer ${authToken}` }, body: JSON.stringify({ sendDays: days }) });
      };

      const getSendDates = () => {
        const [year, mon] = currentMonth.split("-").map(Number);
        const daysInMonth = new Date(year, mon, 0).getDate();
        const dates = [];
        for (let d = 1; d <= daysInMonth; d++) {
          const dt = new Date(year, mon - 1, d);
          const dow = dt.getDay(); // 0=Sun
          const jsDow = dow === 0 ? 7 : dow; // 1=Mon..7=Sun
          if (pollConfig.sendDays.includes(jsDow)) {
            dates.push(`${year}-${String(mon).padStart(2, "0")}-${String(d).padStart(2, "0")}`);
          }
        }
        return dates;
      };

      const sendDates = getSendDates();

      const getSlotSummary = (dateStr) => {
        const sched = schedules[dateStr];
        if (!sched) return { editorial: false, slots: [] };
        return {
          editorial: !!(sched.editorialPoll && sched.editorialPoll.question),
          slots: sched.sponsorSlots || [],
        };
      };

      const statusColor = (s) => s === "locked" ? C.green : s === "pending" ? C.amber : C.dim;
      const statusLabel = (s) => s === "locked" ? "Locked" : s === "pending" ? "Pending" : "Open";

      // Active sponsors with poll entitlements
      const activeSponsorsWithPolls = sponsors.filter(sp => {
        const spContracts = contracts.filter(c => c.sponsorId === sp.id && c.isActive && (c.pollsIncluded || 0) > 0);
        return spContracts.length > 0;
      });

      const saveScheduleField = async (dateStr, field, value) => {
        const sched = schedules[dateStr] || { date: dateStr };
        const updated = { ...sched, [field]: value, date: dateStr };
        setSchedules(prev => ({ ...prev, [dateStr]: updated }));
        await fetch("/api/polls?action=schedule", { method: "POST", headers: { "Content-Type": "application/json", Authorization: `Bearer ${authToken}` }, body: JSON.stringify(updated) });
      };

      const assignSlot = async (dateStr, slotIndex, sponsorId, sponsorName, contractId) => {
        const res = await fetch("/api/polls?action=assign", { method: "POST", headers: { "Content-Type": "application/json", Authorization: `Bearer ${authToken}` }, body: JSON.stringify({ date: dateStr, slotIndex, sponsorId, sponsorName, contractId }) });
        if (res.ok) { const d = await res.json(); setSchedules(prev => ({ ...prev, [dateStr]: d.data })); }
      };

      const lockSlot = async (dateStr, slotIndex) => {
        const res = await fetch("/api/polls?action=lock", { method: "POST", headers: { "Content-Type": "application/json", Authorization: `Bearer ${authToken}` }, body: JSON.stringify({ date: dateStr, slotIndex }) });
        if (res.ok) { const d = await res.json(); setSchedules(prev => ({ ...prev, [dateStr]: d.data })); }
      };

      const unlockSlot = async (dateStr, slotIndex) => {
        const res = await fetch("/api/polls?action=unlock", { method: "POST", headers: { "Content-Type": "application/json", Authorization: `Bearer ${authToken}` }, body: JSON.stringify({ date: dateStr, slotIndex }) });
        if (res.ok) { const d = await res.json(); setSchedules(prev => ({ ...prev, [dateStr]: d.data })); }
      };

      const clearSlot = async (dateStr, slotIndex) => {
        const res = await fetch("/api/polls?action=clear", { method: "POST", headers: { "Content-Type": "application/json", Authorization: `Bearer ${authToken}` }, body: JSON.stringify({ date: dateStr, slotIndex }) });
        if (res.ok) { const d = await res.json(); setSchedules(prev => ({ ...prev, [dateStr]: d.data })); }
      };

      const prevMonth = () => {
        const [y, m] = currentMonth.split("-").map(Number);
        const d = new Date(y, m - 2, 1);
        setCurrentMonth(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`);
      };
      const nextMonth = () => {
        const [y, m] = currentMonth.split("-").map(Number);
        const d = new Date(y, m, 1);
        setCurrentMonth(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`);
      };

      const monthLabel = (() => {
        const [y, m] = currentMonth.split("-").map(Number);
        return new Date(y, m - 1, 1).toLocaleDateString("en-US", { month: "long", year: "numeric" });
      })();

      if (loading) return <div style={{ textAlign: "center", padding: 64, color: C.dim }}>Loading poll calendar...</div>;

      // ─── Date Detail Modal ────
      const DateDetail = ({ dateStr, onClose }) => {
        const sched = schedules[dateStr] || { date: dateStr, sponsorSlots: [] };
        const [editQ, setEditQ] = useState(sched.editorialPoll?.question || "");
        const [editOpts, setEditOpts] = useState((sched.editorialPoll?.options || []).join(", "));
        const slots = sched.sponsorSlots || [];
        const dateObj = new Date(dateStr + "T00:00:00");
        const dateLabel = dateObj.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });

        const saveEditorial = () => {
          const opts = editOpts.split(",").map(o => o.trim()).filter(Boolean);
          saveScheduleField(dateStr, "editorialPoll", { question: editQ.trim(), options: opts, status: editQ.trim() ? "assigned" : "none" });
        };

        const clearEditorial = () => {
          setEditQ(""); setEditOpts("");
          saveScheduleField(dateStr, "editorialPoll", { question: "", options: [], status: "none" });
        };

        // Ensure at least 2 slots
        const displaySlots = [...slots];
        while (displaySlots.length < 2) displaySlots.push({ slotId: `new-${displaySlots.length}`, status: "open" });

        return (
          <Overlay onClose={onClose}>
            <div>
              <h3 style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>{dateLabel}</h3>
              <p style={{ fontSize: 12, color: C.dim, marginBottom: 20 }}>Poll schedule for this send date</p>

              <div style={{ marginBottom: 24 }}>
                <label style={{ display: "block", fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1.2, color: C.muted, marginBottom: 8 }}>Editorial Poll</label>
                <Input label="Question" value={editQ} onChange={e => setEditQ(e.target.value)} placeholder="e.g. How often do you exercise?" />
                <Input label="Options (comma-separated)" value={editOpts} onChange={e => setEditOpts(e.target.value)} placeholder="Daily, A few times a week, Rarely, Never" />
                <div style={{ display: "flex", gap: 6 }}>
                  <Btn onClick={saveEditorial} color={C.white} bg={C.accent} small>Assign</Btn>
                  <Btn onClick={clearEditorial} color={C.muted} bg="transparent" style={{ border: `1px solid ${C.border}` }} small>Clear</Btn>
                </div>
              </div>

              <div>
                <label style={{ display: "block", fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1.2, color: C.muted, marginBottom: 12 }}>Sponsor Poll Slots</label>
                {displaySlots.map((slot, idx) => (
                  <div key={slot.slotId || idx} style={{ padding: 14, background: C.bg, border: `1px solid ${C.border}`, borderRadius: 10, marginBottom: 10 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                      <span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>Slot {idx + 1}</span>
                      <span style={{ fontSize: 11, fontWeight: 600, color: statusColor(slot.status), padding: "2px 8px", borderRadius: 6, background: slot.status === "locked" ? C.greenDim : slot.status === "pending" ? C.amberDim : C.card }}>{statusLabel(slot.status)}{slot.status === "locked" && " \uD83D\uDD12"}</span>
                    </div>
                    {slot.sponsorName && <p style={{ fontSize: 13, color: C.text, marginBottom: 4 }}>{slot.sponsorName}</p>}
                    {slot.pollQuestion && <p style={{ fontSize: 12, color: C.muted, fontStyle: "italic", marginBottom: 4 }}>"{slot.pollQuestion}"</p>}
                    {slot.lockedAt && <p style={{ fontSize: 11, color: C.dim }}>Locked: {fmtDate(slot.lockedAt)}</p>}
                    <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                      {slot.status === "open" && (
                        <select onChange={e => { const [sid, sname, cid] = e.target.value.split("|"); if (sid) assignSlot(dateStr, idx, sid, sname, cid); e.target.value = ""; }}
                          style={{ flex: 1, padding: "8px 10px", background: C.card, border: `1px solid ${C.border}`, borderRadius: 6, color: C.text, fontFamily: FONT, fontSize: 12 }}>
                          <option value="">Assign to sponsor...</option>
                          {activeSponsorsWithPolls.map(sp => {
                            const ac = contracts.find(c => c.sponsorId === sp.id && c.isActive);
                            return <option key={sp.id} value={`${sp.id}|${sp.name}|${ac?.id || ""}`}>{sp.name}</option>;
                          })}
                        </select>
                      )}
                      {slot.status === "pending" && <Btn onClick={() => lockSlot(dateStr, idx)} color={C.white} bg={C.green} small>Lock</Btn>}
                      {slot.status === "locked" && <Btn onClick={() => unlockSlot(dateStr, idx)} color={C.amber} bg={C.amberDim} small>Unlock</Btn>}
                      {slot.sponsorId && <Btn onClick={() => clearSlot(dateStr, idx)} color={C.red} bg={C.redDim} small>Clear</Btn>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </Overlay>
        );
      };

      return (
        <div className="fade-in">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24, flexWrap: "wrap", gap: 12 }}>
            <h2 style={{ fontSize: isMobile ? 20 : 26, fontWeight: 700, letterSpacing: -0.5 }}>Poll Calendar</h2>
            <div style={{ display: "flex", gap: 6 }}>
              {["calendar", "list"].map(m => (
                <button key={m} onClick={() => setViewMode(m)} style={{ padding: "7px 16px", borderRadius: 8, fontSize: 13, fontWeight: 600, fontFamily: FONT, cursor: "pointer", border: "none", background: viewMode === m ? C.accentDim : C.card, color: viewMode === m ? C.accent : C.muted }}>{m === "calendar" ? "Calendar" : "List"}</button>
              ))}
            </div>
          </div>

          {/* Send Days Config */}
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px 20px", marginBottom: 24 }}>
            <label style={{ fontSize: 12, fontWeight: 600, color: C.muted, marginBottom: 10, display: "block" }}>Newsletter Send Days</label>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {[1, 2, 3, 4, 5, 6, 7].map(d => (
                <button key={d} onClick={() => { const next = pollConfig.sendDays.includes(d) ? pollConfig.sendDays.filter(x => x !== d) : [...pollConfig.sendDays, d].sort(); saveSendDays(next); }}
                  style={{ padding: "6px 14px", borderRadius: 6, fontSize: 12, fontWeight: 600, fontFamily: FONT, cursor: "pointer", border: "none", background: pollConfig.sendDays.includes(d) ? C.accent : C.bg, color: pollConfig.sendDays.includes(d) ? C.white : C.dim, transition: "all 0.15s" }}>
                  {dayLabels[d - 1]}
                </button>
              ))}
            </div>
          </div>

          {/* Month navigation */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
            <button onClick={prevMonth} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, color: C.muted, cursor: "pointer", padding: "8px 16px", fontFamily: FONT, fontSize: 13, fontWeight: 600 }}>&larr; Prev</button>
            <h3 style={{ fontSize: 18, fontWeight: 700 }}>{monthLabel}</h3>
            <button onClick={nextMonth} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, color: C.muted, cursor: "pointer", padding: "8px 16px", fontFamily: FONT, fontSize: 13, fontWeight: 600 }}>Next &rarr;</button>
          </div>

          {/* Calendar View */}
          {viewMode === "calendar" && (
            <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "repeat(auto-fill, minmax(200px, 1fr))", gap: 10 }}>
              {sendDates.map(dateStr => {
                const summary = getSlotSummary(dateStr);
                const dateObj = new Date(dateStr + "T00:00:00");
                const dayLabel = dateObj.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
                return (
                  <div key={dateStr} onClick={() => setSelectedDate(dateStr)} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: 14, cursor: "pointer", transition: "border-color 0.15s", minHeight: 100 }}
                    onMouseEnter={e => e.currentTarget.style.borderColor = C.accent} onMouseLeave={e => e.currentTarget.style.borderColor = C.border}>
                    <p style={{ fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 8 }}>{dayLabel}</p>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                      <span style={{ fontSize: 11 }}>📋</span>
                      <span style={{ fontSize: 11, color: summary.editorial ? C.green : C.dim }}>{summary.editorial ? "Editorial: ✓" : "Editorial: —"}</span>
                    </div>
                    {summary.slots.length === 0 && (
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ fontSize: 11 }}>🏷</span>
                        <span style={{ fontSize: 11, color: C.dim }}>No slots</span>
                      </div>
                    )}
                    {summary.slots.map((s, i) => (
                      <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
                        <span style={{ fontSize: 11 }}>🏷</span>
                        <span style={{ fontSize: 11, color: statusColor(s.status) }}>
                          {s.status === "open" ? `Slot ${i + 1}: Open` : `${s.sponsorName || "?"} (${statusLabel(s.status)})`}
                        </span>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          )}

          {/* List View */}
          {viewMode === "list" && (
            <div>
              <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
                <select value={filterSponsor} onChange={e => setFilterSponsor(e.target.value)} style={{ padding: "8px 12px", background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, fontFamily: FONT, fontSize: 12 }}>
                  <option value="">All Sponsors</option>
                  {sponsors.map(sp => <option key={sp.id} value={sp.id}>{sp.name}</option>)}
                </select>
                <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} style={{ padding: "8px 12px", background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, fontFamily: FONT, fontSize: 12 }}>
                  <option value="">All Statuses</option>
                  <option value="open">Open</option>
                  <option value="pending">Pending</option>
                  <option value="locked">Locked</option>
                </select>
              </div>
              <div style={{ background: C.card, borderRadius: 14, border: `1px solid ${C.border}`, overflow: "hidden" }}>
                <div style={{ display: "grid", gridTemplateColumns: "1.5fr 2fr 2fr", padding: "12px 20px", borderBottom: `1px solid ${C.border}`, gap: 12 }}>
                  <p style={{ fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1.5, color: C.dim }}>Date</p>
                  <p style={{ fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1.5, color: C.dim }}>Editorial Poll</p>
                  <p style={{ fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1.5, color: C.dim }}>Sponsor Slots</p>
                </div>
                {sendDates.filter(dateStr => {
                  const summary = getSlotSummary(dateStr);
                  if (filterSponsor && !summary.slots.some(s => s.sponsorId === filterSponsor)) return false;
                  if (filterStatus && !summary.slots.some(s => s.status === filterStatus) && !(filterStatus === "open" && summary.slots.length === 0)) return false;
                  return true;
                }).map((dateStr, i) => {
                  const summary = getSlotSummary(dateStr);
                  const dateObj = new Date(dateStr + "T00:00:00");
                  const dayLabel = dateObj.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
                  const openCount = summary.slots.filter(s => s.status === "open").length || (summary.slots.length === 0 ? 2 : 0);
                  const lockedSlots = summary.slots.filter(s => s.status === "locked");
                  const pendingSlots = summary.slots.filter(s => s.status === "pending");
                  return (
                    <div key={dateStr} onClick={() => setSelectedDate(dateStr)} style={{ display: "grid", gridTemplateColumns: "1.5fr 2fr 2fr", padding: "14px 20px", borderBottom: `1px solid ${C.border}`, gap: 12, cursor: "pointer", alignItems: "center" }}
                      onMouseEnter={e => e.currentTarget.style.background = C.accentDim} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                      <p style={{ fontSize: 13, fontWeight: 500, color: C.text }}>{dayLabel}</p>
                      <p style={{ fontSize: 12, color: summary.editorial ? C.text : C.dim, fontStyle: summary.editorial ? "normal" : "italic" }}>
                        {summary.editorial ? schedules[dateStr]?.editorialPoll?.question : "[not assigned]"}
                      </p>
                      <p style={{ fontSize: 12, color: C.muted }}>
                        {openCount > 0 && `${openCount} open`}
                        {pendingSlots.length > 0 && `${openCount > 0 ? ", " : ""}${pendingSlots.length} pending (${pendingSlots.map(s => s.sponsorName).join(", ")})`}
                        {lockedSlots.length > 0 && `${(openCount > 0 || pendingSlots.length > 0) ? ", " : ""}${lockedSlots.length} locked (${lockedSlots.map(s => s.sponsorName).join(", ")})`}
                        {openCount === 0 && pendingSlots.length === 0 && lockedSlots.length === 0 && "2 open"}
                      </p>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Date Detail Modal */}
          {selectedDate && <DateDetail dateStr={selectedDate} onClose={() => setSelectedDate(null)} />}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // PATTERN MANAGER
    // ═══════════════════════════════════════════════════════════════
    function PatternManager({ sponsor, onUpdate }) {
      const [newPat, setNewPat] = useState("");
      const patterns = getPatterns(sponsor);

      const add = () => {
        const val = newPat.trim();
        if (!val || patterns.includes(val)) return;
        onUpdate([...patterns, val]);
        setNewPat("");
      };

      const remove = (idx) => {
        onUpdate(patterns.filter((_, i) => i !== idx));
      };

      return (
        <div style={{ marginBottom: 20, background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 16 }}>
          <p style={{ fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1.2, color: C.muted, marginBottom: 10 }}>URL Patterns</p>

          {/* Existing patterns */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: patterns.length > 0 ? 10 : 0 }}>
            {patterns.map((p, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, padding: "6px 10px" }}>
                <span style={{ fontSize: 12, fontFamily: MONO, color: C.text }}>{p}</span>
                <button onClick={() => remove(i)} style={{ background: "none", border: "none", color: C.red, cursor: "pointer", fontSize: 14, padding: "0 2px", fontWeight: 700, lineHeight: 1 }}>×</button>
              </div>
            ))}
          </div>

          {/* Add new */}
          <div style={{ display: "flex", gap: 6 }}>
            <input
              value={newPat}
              onChange={e => setNewPat(e.target.value)}
              onKeyDown={e => e.key === "Enter" && add()}
              placeholder="Add URL pattern (e.g. vpdae, go.themommy.news/kp)"
              style={{ flex: 1, padding: "8px 12px", background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, fontFamily: MONO, fontSize: 12, outline: "none", boxSizing: "border-box" }}
            />
            <Btn onClick={add} color={C.green} bg={C.greenDim} disabled={!newPat.trim()}>Add</Btn>
          </div>
          <p style={{ fontSize: 10, color: C.dim, marginTop: 6 }}>Each pattern matches any click URL containing that text. All matching links across all patterns get summed together.</p>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // CONTRACT MANAGER
    // ═══════════════════════════════════════════════════════════════
    function ContractManager({ sponsorId, contracts, activeContract, viewingContract, runs, onActivate, onSelect, onClearFilter, onDelete, onSetModal, onEditContract, sponsor, onUpdateSponsor }) {
      const mob = useWindowWidth() <= MOBILE;
      const unassignedCount = runs.filter(r => !r.contractId || !contracts.find(c => c.id === r.contractId)).length;
      return (
        <div style={{ marginBottom: 20, background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: contracts.length > 0 || unassignedCount > 0 ? 12 : 0 }}>
            <p style={{ fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1.2, color: C.muted }}>Contracts</p>
            <div style={{ display: "flex", gap: 6 }}>
              {viewingContract && <Btn onClick={onClearFilter} color={C.dim} bg="transparent" small style={{ border: `1px solid ${C.border}` }}>Show All Runs</Btn>}
              <Btn onClick={() => onSetModal("addContract")} color={C.purple} bg={C.purpleDim} small>+ New Contract</Btn>
            </div>
          </div>

          {contracts.length === 0 && unassignedCount === 0 && (
            <p style={{ fontSize: 12, color: C.dim, padding: "8px 0" }}>No contracts yet. Create one to group runs and track costs.</p>
          )}

          {contracts.map(ct => {
            const assigned = runs.filter(r => r.contractId === ct.id).length;
            const remaining = ct.totalRuns - assigned;
            const pctVal = ct.totalRuns > 0 ? Math.min((assigned / ct.totalRuns) * 100, 100) : 0;
            const barColor = remaining <= 0 ? C.red : remaining === 1 ? C.amber : C.green;
            const isViewing = viewingContract && viewingContract.id === ct.id;
            return (
              <div key={ct.id}
                onClick={() => onSelect(ct.id)}

    function buildViewOptions(contracts, unassignedRuns, allRuns) {

      const past = contracts.filter(c => !c.isActive).sort((a, b) => new Date(b.endDate || 0) - new Date(a.endDate || 0));

      if (options.length > 1) {

    function getViewData(selectedId, contracts, unassignedRuns, allRuns) {
      if (selectedId === "__all__") {
        const labeled = allRuns.map(r => {
          const ct = contracts.find(c => c.id === r.contractId);
          return { ...r, _contractName: ct ? ct.name : null };
        });
        return { runs: labeled, contract: null, showProgress: false, showCost: true, showTerms: false };
      }
      if (selectedId === "__unassigned__") return { runs: unassignedRuns, contract: null, showProgress: false, showCost: true, showTerms: false };
      const ct = contracts.find(c => c.id === selectedId);
      if (!ct) return { runs: allRuns, contract: null, showProgress: false, showCost: true, showTerms: false };
      return { runs: ct.runs || [], contract: ct, showProgress: true, showCost: true, showTerms: true };
    }

    function calcAggregateCost(viewId, contracts, unassignedRuns, viewRuns, wantCpm, wantCpc) {
      let totalSpent = 0;
      if (viewId === "__all__") {
        for (const c of contracts) {
          if (c.totalSpent > 0) totalSpent += c.totalSpent; // pre-calculated (public page)
          else if (c.totalPrice > 0) totalSpent += ((c.runs || []).length / c.totalRuns) * c.totalPrice; // raw (admin)
        }
        for (const r of unassignedRuns) totalSpent += (r.price || 0);
      } else if (viewId === "__unassigned__") {
        for (const r of unassignedRuns) totalSpent += (r.price || 0);
      }
      if (totalSpent <= 0) return null;
      const tO = viewRuns.reduce((s, r) => s + (r.totalOpens || 0), 0);
      const tC = viewRuns.reduce((s, r) => s + (getRunClicks(r) || r.totalClicks || 0), 0);
      const cm = {};
      if (wantCpm) cm.cpm = tO > 0 ? (totalSpent / tO) * 1000 : 0;
      if (wantCpc) cm.cpc = tC > 0 ? totalSpent / tC : 0;
      return cm;
    }

    // IMAGE VIEWER — zoom/pan for placement images
    // ═══════════════════════════════════════════════════════════════
    function ImageViewer({ src, style = {}, imgStyle = {}, children }) {
      const [scale, setScale] = useState(1);
      const [pos, setPos] = useState({ x: 0, y: 0 });
      const [dragging, setDragging] = useState(false);
      const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
      const [showZoom, setShowZoom] = useState(false);
      const zoomTimer = React.useRef(null);
      const containerRef = React.useRef(null);
      const imgRef = React.useRef(null);
      const lastTouchDist = React.useRef(null);
      const lastTouchCenter = React.useRef(null);

      // Reset zoom when image source changes
      useEffect(() => { setScale(1); setPos({ x: 0, y: 0 }); }, [src]);

      const clampPos = (x, y, s) => {
        if (s <= 1) return { x: 0, y: 0 };
        const c = containerRef.current;
        const img = imgRef.current;
        if (!c || !img) return { x, y };
        const cw = c.clientWidth, ch = c.clientHeight;
        const iw = img.naturalWidth || img.clientWidth, ih = img.naturalHeight || img.clientHeight;
        const dispW = img.clientWidth * s, dispH = img.clientHeight * s;
        const minX = Math.min(0, cw - dispW), minY = Math.min(0, ch - dispH);
        return { x: Math.max(minX, Math.min(0, x)), y: Math.max(minY, Math.min(0, y)) };
      };

      const flashZoom = () => {
        setShowZoom(true);
        clearTimeout(zoomTimer.current);
        zoomTimer.current = setTimeout(() => setShowZoom(false), 1000);
      };

      // Use refs for wheel handler to avoid stale closures and enable passive:false
      const scaleRef = React.useRef(scale);
      const posRef = React.useRef(pos);
      scaleRef.current = scale;
      posRef.current = pos;

      useEffect(() => {
        const el = containerRef.current;
        if (!el) return;
        const onWheel = (e) => {
          const s = scaleRef.current, p = posRef.current;
          if (s <= 1 && e.deltaY > 0) return;
          e.preventDefault();
          const rect = el.getBoundingClientRect();
          const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
          const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
          const ns = Math.max(1, Math.min(5, s * factor));
          const ratio = ns / s;
          const nx = cx - ratio * (cx - p.x), ny = cy - ratio * (cy - p.y);
          const cp = clampPos(nx, ny, ns);
          setScale(ns); setPos(cp); flashZoom();
        };
        el.addEventListener("wheel", onWheel, { passive: false });
        return () => el.removeEventListener("wheel", onWheel);
      }, []);

      const handleMouseDown = (e) => {
        if (scale <= 1) return;
        e.preventDefault();
        setDragging(true);
        setDragStart({ x: e.clientX - pos.x, y: e.clientY - pos.y });
      };
      const handleMouseMove = (e) => {
        if (!dragging) return;
        const nx = e.clientX - dragStart.x, ny = e.clientY - dragStart.y;
        setPos(clampPos(nx, ny, scale));
      };
      const handleMouseUp = () => setDragging(false);

      useEffect(() => {
        if (dragging) {
          const up = () => setDragging(false);
          window.addEventListener("mouseup", up);
          window.addEventListener("mousemove", handleMouseMove);
          return () => { window.removeEventListener("mouseup", up); window.removeEventListener("mousemove", handleMouseMove); };
        }
      }, [dragging, dragStart, scale]);

      const handleDblClick = () => { setScale(1); setPos({ x: 0, y: 0 }); };

      // Touch events
      const getTouchDist = (t) => Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
      const getTouchCenter = (t) => ({ x: (t[0].clientX + t[1].clientX) / 2, y: (t[0].clientY + t[1].clientY) / 2 });

      const handleTouchStart = (e) => {
        if (e.touches.length === 2) {
          e.preventDefault();
          lastTouchDist.current = getTouchDist(e.touches);
          lastTouchCenter.current = getTouchCenter(e.touches);
        } else if (e.touches.length === 1 && scale > 1) {
          setDragging(true);
          setDragStart({ x: e.touches[0].clientX - pos.x, y: e.touches[0].clientY - pos.y });
        }
      };
      const handleTouchMove = (e) => {
        if (e.touches.length === 2 && lastTouchDist.current) {
          e.preventDefault();
          const dist = getTouchDist(e.touches);
          const center = getTouchCenter(e.touches);
          const rect = containerRef.current.getBoundingClientRect();
          const cx = center.x - rect.left, cy = center.y - rect.top;
          const factor = dist / lastTouchDist.current;
          const ns = Math.max(1, Math.min(5, scale * factor));
          const ratio = ns / scale;
          const nx = cx - ratio * (cx - pos.x), ny = cy - ratio * (cy - pos.y);
          setScale(ns); setPos(clampPos(nx, ny, ns)); flashZoom();
          lastTouchDist.current = dist;
          lastTouchCenter.current = center;
        } else if (e.touches.length === 1 && dragging && scale > 1) {
          e.preventDefault();
          const nx = e.touches[0].clientX - dragStart.x, ny = e.touches[0].clientY - dragStart.y;
          setPos(clampPos(nx, ny, scale));
        }
      };
      const handleTouchEnd = (e) => {
        if (e.touches.length < 2) { lastTouchDist.current = null; lastTouchCenter.current = null; }
        if (e.touches.length === 0) setDragging(false);
      };

      const zoomed = scale > 1.01;

      return (
        <div ref={containerRef} onMouseDown={handleMouseDown} onDoubleClick={handleDblClick}
          onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}
          style={{ overflow: "hidden", position: "relative", borderRadius: 8, cursor: dragging ? "grabbing" : zoomed ? "grab" : "zoom-in", touchAction: zoomed ? "none" : "auto", ...style }}>
          <img ref={imgRef} src={src} draggable={false} style={{ display: "block", width: "100%", transformOrigin: "0 0", transform: `translate(${pos.x}px, ${pos.y}px) scale(${scale})`, transition: dragging ? "none" : "transform 0.1s ease-out", userSelect: "none", pointerEvents: "none", ...imgStyle }} />
          {zoomed && showZoom && (
            <div style={{ position: "absolute", bottom: 8, left: 8, background: "rgba(0,0,0,0.6)", color: "#fff", fontSize: 11, fontWeight: 600, padding: "3px 8px", borderRadius: 6, pointerEvents: "none", transition: "opacity 0.3s", fontFamily: FONT }}>{scale.toFixed(1)}x</div>
          )}
          {zoomed && (
            <button onClick={(e) => { e.stopPropagation(); handleDblClick(); }} style={{ position: "absolute", top: 8, right: 8, background: "rgba(0,0,0,0.55)", color: "#fff", border: "none", fontSize: 11, fontWeight: 600, padding: "4px 10px", borderRadius: 6, cursor: "pointer", fontFamily: FONT }}>Reset zoom</button>
          )}
          {children}
        </div>
      );
    }

    function compressImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const MAX_W = 800;
            let w = img.width, h = img.height;
            if (w > MAX_W) { h = Math.round(h * MAX_W / w); w = MAX_W; }
            const canvas = document.createElement("canvas");
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, w, h);
            const dataUrl = canvas.toDataURL("image/jpeg", 0.8);
            const sizeKB = Math.round((dataUrl.length * 3) / 4 / 1024);
            if (sizeKB > 900) reject(new Error("Image is too large. Please use a smaller or lower-resolution screenshot."));
            else resolve(dataUrl);
          };
          img.onerror = () => reject(new Error("Failed to load image"));
          img.src = e.target.result;
        };
        reader.onerror = () => reject(new Error("Failed to read file"));
        reader.readAsDataURL(file);
      });
    }

    function sanitizeHtml(html) {
      const allowed = new Set(["IMG","A","TABLE","THEAD","TBODY","TFOOT","TR","TD","TH","DIV","SPAN","P","H1","H2","H3","H4","H5","H6","BR","HR","STRONG","EM","B","I","U","UL","OL","LI","STYLE","CENTER","SECTION","HEADER","FOOTER","FIGURE","FIGCAPTION","BLOCKQUOTE","SUP","SUB"]);
      const allowedAttrs = new Set(["style","class","href","src","alt","width","height","colspan","rowspan","align","valign","border","cellpadding","cellspacing","target","title","id"]);
      const temp = document.createElement("div");
      temp.innerHTML = html;
      // Remove all script tags
      temp.querySelectorAll("script").forEach(el => el.remove());
      // Walk and sanitize
      const walk = (node) => {
        const children = [...node.childNodes];
        for (const child of children) {
          if (child.nodeType === 1) {
            if (!allowed.has(child.tagName)) {
              while (child.firstChild) node.insertBefore(child.firstChild, child);
              node.removeChild(child);
              continue;
            }
            [...child.attributes].forEach(a => {
              if (a.name.startsWith("on")) child.removeAttribute(a.name);
              else if (!allowedAttrs.has(a.name)) child.removeAttribute(a.name);
            });
            walk(child);
          }
        }
      };
      walk(temp);
      return temp.innerHTML;
    }

        const handler = (e) => {
          // Don't capture if user is typing in an input/textarea
          const tag = document.activeElement?.tagName;
          if (tag === "INPUT" || tag === "TEXTAREA") return;
          e.preventDefault();
          const html = e.clipboardData.getData("text/html");
          const text = e.clipboardData.getData("text/plain");
          if (html && html.trim().length > 10) {
            setNewHtml(sanitizeHtml(html)); setHtmlWarning(null);
          } else if (text) {
            setHtmlWarning("Only plain text was captured. Try selecting the content directly from the browser preview of your newsletter (not the Beehiiv editor) and copying again.");
          }
        };
        document.addEventListener("paste", handler);
        return () => document.removeEventListener("paste", handler);
      }, [contentMode, newHtml]);

      // Listen for iframe height messages (admin HTML preview)
      useEffect(() => {
        const handler = (e) => {
          if (e.data?.type === "iframeHeight" && e.data.id && e.data.height) {
            const iframe = document.querySelector(`iframe[data-placement-id="${e.data.id}"]`);
            if (iframe) iframe.style.height = (e.data.height + 32) + "px";
          }
        };
        window.addEventListener("message", handler);
        return () => window.removeEventListener("message", handler);
      }, []);

      const fetchPlacements = async () => {
        try {
          const res = await fetch(`/api/placements?action=list&sponsorId=${sponsorId}`, { headers });
          if (res.ok) setPlacements(await res.json());
        } catch {}
        setLoading(false);
      };
      useEffect(() => { fetchPlacements(); }, [sponsorId]);

      const fetchFull = async (pid) => {
        try {
          const res = await fetch(`/api/placements?action=get&sponsorId=${sponsorId}&placementId=${pid}`, { headers });
          if (res.ok) { const d = await res.json(); setExpandedData(p => ({ ...p, [pid]: d })); }
        } catch {}
      };

      const handleFile = async (file) => {
        if (!file) return;
        setImgError(null);
        try { const d = await compressImage(file); setNewImage(d); }
        catch (e) { setImgError(e.message); }
      };

      const handleDrop = (e) => { e.preventDefault(); setDragOver(false); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); };

      const createPlacement = async (sendForReview) => {
        if (contentMode === "image" && !newImage) return;
        if (contentMode === "html" && !newHtml) return;
        setSaving(true);
        const cid = selCampaign?.id || null;
        const cName = selCampaign?.name || customCampaign || null;
        const rn = selRunNumber ? parseInt(selRunNumber, 10) : null;
        const tr = selCampaign?.totalRuns || null;
        const body = {
          sponsorId, shareToken, contractId: cid,
          campaignName: cName, runNumber: rn, totalRuns: tr,
          scheduledDate: newDate || null, headline: newHeadline, notes: newNotes,
          contentType: contentMode, sendForReview,
        };
        if (contentMode === "html") body.htmlContent = newHtml;
        else { body.imageData = newImage; if (newPreviewUrl.trim()) body.previewUrl = newPreviewUrl.trim(); }
        try {
          await fetch("/api/placements?action=create", { method: "POST", headers, body: JSON.stringify(body) });
          setNewImage(null); setNewHtml(""); setNewPreviewUrl(""); setNewDate(""); setNewHeadline(""); setNewNotes(""); setHtmlWarning(null);
          setSelCampaign(null); setCustomCampaign(""); setSelRunNumber("");
          await fetchPlacements();
        } catch {}
        setSaving(false);
      };

      const initializeSchedule = async () => {
        if (!selCampaign || !initStartDate) return;
        setInitSaving(true);
        try {
          await fetch("/api/placements?action=initialize-schedule", {
            method: "POST", headers,
            body: JSON.stringify({
              sponsorId, shareToken, contractId: selCampaign.id,
              campaignName: selCampaign.name, totalRuns: selCampaign.totalRuns,
              startDate: initStartDate, frequency: initFrequency,
            }),
          });
          setShowInitSchedule(false); setInitStartDate(""); setInitFrequency("1x_week");
          await fetchPlacements();
        } catch {}
        setInitSaving(false);
      };

      const fillPlaceholder = async (pl) => {
        // Update a placeholder with content → transitions to draft
        setSaving(true);
        const body = { contentType: contentMode };
        if (contentMode === "html") body.htmlContent = newHtml;
        else { body.imageData = newImage; if (newPreviewUrl.trim()) body.previewUrl = newPreviewUrl.trim(); }
        if (newHeadline) body.headline = newHeadline;
        if (newNotes) body.notes = newNotes;
        if (newDate) body.scheduledDate = newDate;
        try {
          await fetch(`/api/placements?action=update&sponsorId=${sponsorId}&placementId=${pl.placementId}`, {
            method: "POST", headers, body: JSON.stringify(body),
          });
          setNewImage(null); setNewHtml(""); setNewPreviewUrl(""); setNewDate(""); setNewHeadline(""); setNewNotes(""); setHtmlWarning(null);
          setEditingPlaceholder(null);
          await fetchPlacements();
        } catch {}
        setSaving(false);
      };

      const doAction = async (action, pid, body = {}) => {
        await fetch(`/api/placements?action=${action}&sponsorId=${sponsorId}&placementId=${pid}`, { method: "POST", headers, body: JSON.stringify(body) });
        await fetchPlacements();
      };

      const handleReplaceFile = async (pid, file) => {
        if (!file) return;
        try {
          const d = await compressImage(file);
          setReplaceImage(p => ({ ...p, [pid]: d }));
        } catch (e) { setImgError(e.message); }
      };

      const doResubmit = async (pid) => {
        const body = {};
        if (replaceImage[pid]) body.imageData = replaceImage[pid];
        if (replaceHtml[pid]) body.htmlContent = replaceHtml[pid];
        const ef = editFields[pid];
        if (ef?.headline !== undefined) body.headline = ef.headline;
        if (ef?.notes !== undefined) body.notes = ef.notes;
        await fetch(`/api/placements?action=resubmit&sponsorId=${sponsorId}&placementId=${pid}`, { method: "POST", headers, body: JSON.stringify(body) });
        setReplaceImage(p => { const n = { ...p }; delete n[pid]; return n; });
        setReplaceHtml(p => { const n = { ...p }; delete n[pid]; return n; });
        setEditFields(p => { const n = { ...p }; delete n[pid]; return n; });
        await fetchPlacements();
      };

      const doBatchComplete = async () => {
        const ids = Object.keys(batchSelect).filter(k => batchSelect[k]);
        if (!ids.length) return;
        await fetch(`/api/placements?action=batch-complete&sponsorId=${sponsorId}`, { method: "POST", headers, body: JSON.stringify({ placementIds: ids }) });
        setBatchSelect({});
        await fetchPlacements();
      };

      const counts = { placeholder: 0, draft: 0, pending_review: 0, changes_requested: 0, approved: 0, completed: 0 };
      placements.forEach(p => { if (counts[p.status] !== undefined) counts[p.status]++; });

      const statusLabel = { placeholder: "PLACEHOLDER", draft: "DRAFT", pending_review: "PENDING REVIEW", changes_requested: "CHANGES REQUESTED", approved: "APPROVED", completed: "COMPLETED" };
      const statusIcon = { placeholder: "\u25CB", draft: "\u{1F4DD}", pending_review: "\u231B", changes_requested: "\u{1F534}", approved: "\u2713", completed: "\u2713" };
      const statusColor = { placeholder: C.dim, draft: C.dim, pending_review: C.amber, changes_requested: C.red, approved: C.green, completed: C.dim };
      const fmtD = (d) => d ? new Date(d + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) : "No date";

      // Group placements by campaign
      const campaignGroups = {};
      const otherPlacements = [];
      placements.forEach(p => {
