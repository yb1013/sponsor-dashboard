        <div style="font-size:28px;font-weight:700;color:${color};font-family:${F}">${value}</div></div>`;

      // Runs table rows
      const sortedRuns = [...runs].sort((a, b) => new Date(b.sendDate) - new Date(a.sendDate));
      const rows = sortedRuns.map((r, i) => {
        const clicks = getRunClicks(r);
        const ctr = r.totalOpens > 0 ? (clicks / r.totalOpens) * 100 : 0;
        const bg = i % 2 === 0 ? P.bg : P.card;
        return `<tr style="background:${bg}">
          <td style="padding:10px 12px;font-size:12px;color:${P.text};border-bottom:1px solid ${P.border}">${r.emailName}${r.description ? `<br><span style="font-size:11px;color:${P.muted};font-style:italic">${r.description}</span>` : ''}</td>
          <td style="padding:10px 8px;font-size:12px;color:${P.muted};border-bottom:1px solid ${P.border};text-align:center">${fd(r.sendDate)}</td>
          <td style="padding:10px 8px;font-size:13px;font-weight:600;color:${P.blue};border-bottom:1px solid ${P.border};text-align:center">${n(r.totalOpens)}</td>
          <td style="padding:10px 8px;font-size:13px;font-weight:600;color:${P.green};border-bottom:1px solid ${P.border};text-align:center">${n(clicks)}</td>
          <td style="padding:10px 8px;font-size:13px;font-weight:600;color:${P.amber};border-bottom:1px solid ${P.border};text-align:center">${p(ctr)}</td></tr>`;
      }).join('');

      return `<div style="font-family:${F};color:${P.text};max-width:720px;margin:0 auto;padding:8px 0">
        ${config.publicationName ? `<div style="font-size:22px;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:${P.text};margin-bottom:4px">${config.publicationName}</div>` : ''}
        <div style="font-size:13px;color:${P.muted};margin-bottom:16px">Campaign Performance Report</div>
        <hr style="border:none;border-top:1px solid ${P.border};margin:0 0 20px"/>

        <div style="font-size:28px;font-weight:700;color:${P.text};margin-bottom:4px">${sponsor.name}</div>
        ${contract ? `<div style="font-size:13px;color:${P.muted};margin-bottom:2px">${fd(contract.startDate)} — ${fd(contract.endDate)}</div>
        <div style="font-size:13px;color:${P.muted};margin-bottom:16px">${runs.length} of ${contract.totalRuns} emails delivered</div>` : `<div style="font-size:13px;color:${P.muted};margin-bottom:16px">${runs.length} email${runs.length !== 1 ? 's' : ''} sent</div>`}

        <div style="display:flex;gap:12px;margin-bottom:${hasAnyCost ? '12px' : '20px'}">
          ${mc("Total Opens", n(totals.opens), P.blue)}
          ${mc("Total Clicks", n(totals.clicks), P.green)}
          ${mc("Click-Through Rate", p(totals.ctr), P.amber)}
        </div>

        ${hasAnyCost ? `<div style="display:flex;gap:12px;margin-bottom:${terms.length > 0 ? '12px' : '20px'}">
          ${showCpm ? mc("CPM", m(costMetrics.cpm), P.purple) : ''}
          ${showCpc ? mc("CPC", m(costMetrics.cpc), P.purple) : ''}
        </div>` : ''}

        ${hasAnyCost && terms.length > 0 ? `<div style="margin-bottom:20px;display:flex;gap:6px;flex-wrap:wrap">${terms.map(t => `<span style="padding:5px 12px;border-radius:16px;background:#F3F0FF;border:1px solid #E0D8F8;color:${P.purple};font-size:11px;font-weight:600">✦ ${t}</span>`).join('')}</div>` : ''}

        <div style="text-align:center;padding:20px 0;margin-bottom:12px;background:${P.card};border:1px solid ${P.border};border-radius:12px">
          <div style="font-size:12px;color:${P.muted};margin-bottom:4px">Seen by</div>
          <div style="font-size:38px;font-weight:700;color:${P.blue};font-family:${F}">${n(totalOpens)}</div>
          <div style="font-size:12px;color:${P.muted}">readers</div>
        </div>

        <hr style="border:none;border-top:1px solid ${P.border};margin:0 0 16px"/>
        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:${P.muted};margin-bottom:12px">Email Breakdown</div>
        <table style="width:100%;border-collapse:collapse;border:1px solid ${P.border};border-radius:8px;overflow:hidden">
          <thead><tr style="background:${P.card}">
            <th style="padding:10px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:${P.muted};text-align:left;border-bottom:1px solid ${P.border}">Email</th>
            <th style="padding:10px 8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:${P.muted};text-align:center;border-bottom:1px solid ${P.border}">Date</th>
            <th style="padding:10px 8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:${P.muted};text-align:center;border-bottom:1px solid ${P.border}">Opens</th>

            <th style="padding:10px 8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:${P.muted};text-align:center;border-bottom:1px solid ${P.border}">CTR</th>

    function downloadReport({ sponsor, contract, runs, totals, costMetrics, config, includeCpm = true, includeCpc = true }) {
      const html = buildReportHTML({ sponsor, contract, runs, totals, costMetrics, config, includeCpm, includeCpc });
      const printWindow = window.open('', '_blank', 'width=850,height=1100');
      printWindow.document.write(`<!DOCTYPE html><html><head>
        <title>${sponsor.name} - Campaign Report</title>
        <style>
          @media print { body { margin: 0; padding: 0; } @page { margin: 0.4in 0.5in; size: letter; } }
          body { margin: 0; padding: 20px 40px; background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            color: #1a1a2e; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        </style>
      </head><body>${html}</body></html>`);
      printWindow.document.close();
      printWindow.onload = () => { setTimeout(() => { printWindow.print(); }, 300); };
      setTimeout(() => { if (!printWindow.closed) printWindow.print(); }, 1000);
    }

    function CumulativeChart({ data, onHover }) {
      const containerRef = React.useRef(null);
      const [hoverX, setHoverX] = React.useState(null);
      const [hoverY, setHoverY] = React.useState(null);
      const W = 800, H = 220;
      const pad = { top: 20, right: 20, bottom: 35, left: 20 };
      const maxVal = Math.max(...data.map(d => d.total)) || 1;
      const minDate = data[0].date.getTime();
      const maxDate = data[data.length - 1].date.getTime();
      const dateRange = maxDate - minDate || 1;
      const toX = (date) => pad.left + ((date.getTime() - minDate) / dateRange) * (W - pad.left - pad.right);
      const toY = (val) => pad.top + (1 - val / maxVal) * (H - pad.top - pad.bottom);
      const points = data.map(d => ({ x: toX(d.date), y: toY(d.total), ...d }));
      const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
      const areaPath = linePath + ` L ${points[points.length - 1].x} ${H - pad.bottom} L ${points[0].x} ${H - pad.bottom} Z`;
      const handleMouseMove = (e) => {
        const rect = containerRef.current?.getBoundingClientRect();
        if (!rect) return;
        const mouseXRatio = (e.clientX - rect.left) / rect.width;
        const svgX = mouseXRatio * W;
        let closest = points[0], closestDist = Infinity;
        for (const p of points) { const dist = Math.abs(p.x - svgX); if (dist < closestDist) { closestDist = dist; closest = p; } }
        onHover({ total: closest.total, date: closest.date, isSend: closest.isSend, label: closest.label });
        setHoverX(closest.x);
        setHoverY(closest.y);
      };
      const sendPoints = points.filter(p => p.isSend);
      return (
        <div ref={containerRef} onMouseMove={handleMouseMove} onMouseLeave={() => { onHover(null); setHoverX(null); setHoverY(null); }} style={{ cursor: "crosshair", position: "relative" }}>
          <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
            <defs>
              <linearGradient id="reachGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#4F8FF7" stopOpacity="0.3" />
                <stop offset="100%" stopColor="#4F8FF7" stopOpacity="0.02" />
              </linearGradient>
            </defs>
            <path d={areaPath} fill="url(#reachGrad)" />
            <path d={linePath} fill="none" stroke="#4F8FF7" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
            {sendPoints.map((p, i) => (
              <circle key={i} cx={p.x} cy={p.y} r="5" fill="#4F8FF7" stroke="#06090F" strokeWidth="2" />
            ))}
            {hoverX !== null && (
              <line x1={hoverX} y1={pad.top} x2={hoverX} y2={H - pad.bottom} stroke="rgba(255,255,255,0.2)" strokeWidth="1" strokeDasharray="4 3" />
            )}
            {hoverX !== null && hoverY !== null && (
              <circle cx={hoverX} cy={hoverY} r="6" fill="#4F8FF7" stroke="#fff" strokeWidth="2" />
            )}
            {sendPoints.map((p, i) => (
              <text key={i} x={p.x} y={H - 8} textAnchor="middle" style={{ fontSize: 10, fill: "#4A5A72", fontFamily: FONT }}>
                {new Date(p.date).toLocaleDateString("en-US", { month: "short", day: "numeric" })}
              </text>
            ))}
          </svg>
        </div>
      );
    }

    function ReachSection({ runs }) {
      const [hoverData, setHoverData] = useState(null);
      const w = useWindowWidth();
      const mob = w <= MOBILE;
      const chartData = buildChartData(runs);

    // ─── Inquiry Card ──────────────────────────────────────────

                {fmtOpens && <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 6, background: C.purpleDim, color: C.purple, fontWeight: 600 }}>{fmtOpens} opens</span>}
                {inq.takeover && !inq.takeoverTotal && <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 6, background: C.amberDim, color: C.amber, fontWeight: 600 }}>Takeover</span>}

    // ─── Package Selector (shared by Convert + Add Sponsor) ─────
    function PackageSelector({ selected, onChange }) {
      const tiers = ["custom", "starter", "growth", "partner"];
      const labels = { custom: "Custom", starter: "Starter", growth: "Growth", partner: "Partner" };
      return (
        <div style={{ marginBottom: 20 }}>
          <label style={{ display: "block", fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1.2, color: C.muted, marginBottom: 8 }}>Package</label>
          <div style={{ display: "flex", gap: 6 }}>
            {tiers.map(t => (
              <button key={t} onClick={() => onChange(t)} style={{
                flex: 1, padding: "9px 0", borderRadius: 8, fontSize: 13, fontWeight: 600, fontFamily: FONT,
                cursor: "pointer", transition: "all 0.15s", border: "none",

    function calcEndDate(startDate, months) {
      if (!startDate) return "";
      const d = new Date(startDate + "T00:00:00");
      d.setMonth(d.getMonth() + months);
      d.setDate(0); // last day of previous month = last day of target month
      return d.toISOString().split("T")[0];
    }

    // ─── Convert Inquiry Form ────────────────────────────────────
    function ConvertInquiryForm({ inquiry, onConvert, onCancel, pricingCfg }) {
      const tierLabels = { starter: "Starter", growth: "Growth", partner: "Partner" };
      const tierMonths = { starter: 3, growth: 6, partner: 12 };
      const today = new Date().toISOString().split("T")[0];

      const defaultTier = inquiry.tier && tierLabels[inquiry.tier] ? inquiry.tier : "custom";
      const [pkgTier, setPkgTier] = useState(defaultTier);
      const [sponsorName, setSponsorName] = useState(inquiry.company || inquiry.name || "");
      const [contractName, setContractName] = useState("");
      const [price, setPrice] = useState("");
      const [totalRuns, setTotalRuns] = useState("");
      const [startDate, setStartDate] = useState(today);
      const [endDate, setEndDate] = useState("");
      const [takeover, setTakeover] = useState(inquiry.takeover || false);

      const getTierConfig = (tier) => {
        if (!pricingCfg || tier === "custom") return null;
        const map = {
          starter: { name: "Starter Package", price: pricingCfg.starterPrice, runs: pricingCfg.starterPlacements, months: pricingCfg.starterMonths || 3, polls: pricingCfg.starterPolls ?? 0 },
          growth: { name: "Growth Package", price: pricingCfg.growthPrice, runs: pricingCfg.growthPlacements, months: pricingCfg.growthMonths || 6, polls: pricingCfg.growthPolls ?? 1 },
          partner: { name: "Partner Package", price: pricingCfg.partnerPrice, runs: pricingCfg.partnerPlacements, months: pricingCfg.partnerMonths || 12, polls: pricingCfg.partnerPolls ?? 3 },
        };
        return map[tier] || null;
      };

      const handleTierChange = (tier) => {
        setPkgTier(tier);
        const tc = getTierConfig(tier);
        if (tc) {
          setContractName(tc.name);
          setPrice(tc.price);
          setTotalRuns(tc.runs);
          setTakeover(false);
          if (startDate) setEndDate(calcEndDate(startDate, tc.months));
        } else {
          setContractName("");
          setPrice("");
          setTotalRuns("");
          setEndDate("");
          setTakeover(false);
        }
      };

      // Initialize from inquiry tier on mount
      useEffect(() => {
        if (defaultTier !== "custom") handleTierChange(defaultTier);
        else {
          setContractName((tierLabels[inquiry.tier] || "Sponsor") + " Package");
          setPrice(inquiry.price ?? "");
          setTotalRuns(inquiry.placements ?? "");
          const months = tierMonths[inquiry.tier] || 6;
          setEndDate(calcEndDate(today, months));
          setTakeover(inquiry.takeover || false);
        }
      }, []);

      const tc = getTierConfig(pkgTier);
      const takeoverCost = tc && pricingCfg ? pricingCfg.takeoverPerEmail * tc.runs : 0;
      const displayPrice = takeover && tc ? (parseFloat(price) || 0) + takeoverCost : parseFloat(price) || 0;

      const handleStartChange = (val) => {
        setStartDate(val);
        if (tc && val) setEndDate(calcEndDate(val, tc.months));
      };

      return (
        <div>
          <h3 style={{ fontSize: 20, fontWeight: 700, marginBottom: 8 }}>Convert to Sponsor</h3>
          <p style={{ fontSize: 13, color: C.muted, marginBottom: 24 }}>Review and adjust details, then confirm to create the sponsor and contract.</p>
          <Input label="Sponsor / Company Name" value={sponsorName} onChange={e => setSponsorName(e.target.value)} />
          <PackageSelector selected={pkgTier} onChange={handleTierChange} />
          <Input label="Contract Name" value={contractName} onChange={e => setContractName(e.target.value)} />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Input label="Total Price ($)" type="number" value={price} onChange={e => setPrice(e.target.value)} />
            <Input label="Number of Runs" type="number" value={totalRuns} onChange={e => setTotalRuns(e.target.value)} />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Input label="Start Date" type="date" value={startDate} onChange={e => handleStartChange(e.target.value)} />
            <Input label="End Date" type="date" value={endDate} onChange={e => setEndDate(e.target.value)} />
          </div>
          {pkgTier !== "custom" && tc && (
            <div style={{ marginBottom: 16 }}>
              {tc.runs > 0 && pricingCfg?.takeoverPerEmail > 0 && (
                <button onClick={() => { setTakeover(!takeover); if (!takeover) setPrice((parseFloat(price) || 0) + takeoverCost); else setPrice(Math.max(0, (parseFloat(price) || 0) - takeoverCost)); }} style={{
                  display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", width: "100%",
                  background: takeover ? C.greenDim : C.bg, border: `1px solid ${takeover ? "rgba(52,211,153,0.3)" : C.border}`,
                  borderRadius: 8, cursor: "pointer", transition: "all 0.15s", marginBottom: 8,
                }}>
                  <div style={{ width: 36, height: 20, borderRadius: 10, padding: 2, background: takeover ? C.green : C.dim, transition: "background 0.15s", display: "flex", alignItems: "center" }}>
                    <div style={{ width: 16, height: 16, borderRadius: 8, background: "#fff", transform: takeover ? "translateX(16px)" : "translateX(0)", transition: "transform 0.15s" }} />
                  </div>
                  <span style={{ fontSize: 13, fontWeight: 600, color: takeover ? C.green : C.muted, fontFamily: FONT }}>Newsletter Takeover</span>
                  <span style={{ fontSize: 12, color: C.dim, marginLeft: "auto" }}>+${takeoverCost.toLocaleString()}</span>
                </button>
              )}
              {tc.polls > 0 && (
                <div style={{ padding: "8px 14px", background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontSize: 13, color: C.muted }}>Custom Polls</span>
                  <span style={{ fontSize: 13, fontWeight: 600, color: C.accent }}>{tc.polls} included</span>
                </div>
              )}
            </div>
          )}
          <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 8 }}>
            <Btn onClick={onCancel} color={C.muted} bg="transparent" style={{ border: `1px solid ${C.border}` }}>Cancel</Btn>
            <Btn onClick={() => sponsorName.trim() && onConvert({ sponsorName: sponsorName.trim(), contractName: contractName.trim(), totalPrice: parseFloat(price) || 0, totalRuns: parseInt(totalRuns) || 1, startDate: startDate || null, endDate: endDate || null, packageTier: pkgTier, pollsIncluded: tc ? tc.polls : 0, takeoverIncluded: takeover })} color={C.white} bg={C.accent} disabled={!sponsorName.trim()}>Convert</Btn>
          </div>
        </div>
      );
    }

    // ─── Forms ───
    function SettingsForm({ config, authToken, onSave, onCancel }) {
      const [ak, setAk] = useState(config.apiKey || "");
      const [pi, setPi] = useState(config.pubId || "");
      const [pn, setPn] = useState(config.publicationName || "");

        try { const res = await fetch("/api/debug", { method: "POST", headers: { "Content-Type": "application/json", ...(authToken ? { "Authorization": `Bearer ${authToken}` } : {}) }, body: JSON.stringify({ apiKey: ak.trim(), pubId: pi.trim() }) }); setDebugData(await res.json()); }
        catch (e) { setDebugData({ error: e.message }); }
        finally { setDebugLoading(false); }
      };
      return (

    function AddSponsorForm({ onSave, onCancel, pricingCfg }) {
      const [name, setName] = useState("");
      const [patterns, setPatterns] = useState([""]);
      const [pkgTier, setPkgTier] = useState("custom");
      const [contractName, setContractName] = useState("");
      const [price, setPrice] = useState("");
      const [totalRuns, setTotalRuns] = useState("");
      const today = new Date().toISOString().split("T")[0];
      const [startDate, setStartDate] = useState("");
      const [endDate, setEndDate] = useState("");
      const [takeover, setTakeover] = useState(false);

      const updatePat = (i, val) => { const p = [...patterns]; p[i] = val; setPatterns(p); };
      const addPat = () => setPatterns([...patterns, ""]);
      const removePat = (i) => { if (patterns.length <= 1) return; setPatterns(patterns.filter((_, idx) => idx !== i)); };

      const getTierConfig = (tier) => {
        if (!pricingCfg || tier === "custom") return null;
        const map = {
          starter: { name: "Starter Package", price: pricingCfg.starterPrice, runs: pricingCfg.starterPlacements, months: pricingCfg.starterMonths || 3, polls: pricingCfg.starterPolls ?? 0 },
          growth: { name: "Growth Package", price: pricingCfg.growthPrice, runs: pricingCfg.growthPlacements, months: pricingCfg.growthMonths || 6, polls: pricingCfg.growthPolls ?? 1 },
          partner: { name: "Partner Package", price: pricingCfg.partnerPrice, runs: pricingCfg.partnerPlacements, months: pricingCfg.partnerMonths || 12, polls: pricingCfg.partnerPolls ?? 3 },
        };
        return map[tier] || null;
      };

      const handleTierChange = (tier) => {
        setPkgTier(tier);
        const tc = getTierConfig(tier);
        if (tc) {
          setContractName(tc.name);
          setPrice(tc.price);
          setTotalRuns(tc.runs);
          setTakeover(false);
          if (startDate) setEndDate(calcEndDate(startDate, tc.months));
        } else {
          setContractName(""); setPrice(""); setTotalRuns(""); setEndDate(""); setTakeover(false);
        }
      };

      const tc = getTierConfig(pkgTier);
      const takeoverCost = tc && pricingCfg ? pricingCfg.takeoverPerEmail * tc.runs : 0;

      const handleStartChange = (val) => {
        setStartDate(val);
        if (tc && val) setEndDate(calcEndDate(val, tc.months));
      };

      const handleSave = () => {
        if (!name.trim()) return;
        const contractData = (pkgTier !== "custom" || contractName.trim()) ? {
          contractName: contractName.trim() || (name.trim() + " Contract"),
          totalPrice: parseFloat(price) || 0,
          totalRuns: parseInt(totalRuns) || 1,
          startDate: startDate || null,
          endDate: endDate || null,
          packageTier: pkgTier,
          pollsIncluded: tc ? tc.polls : 0,
          takeoverIncluded: takeover,
        } : null;
        onSave(name.trim(), patterns.filter(p => p.trim()), contractData);
      };

      return (
        <div>
          <h3 style={{ fontSize: 20, fontWeight: 700, marginBottom: 24 }}>Add Sponsor</h3>
          <Input label="Sponsor Name" value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Platoon Kids" />

          <label style={{ display: "block", fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1.2, color: C.muted, marginBottom: 6 }}>URL Patterns</label>
          {patterns.map((p, i) => (
            <div key={i} style={{ display: "flex", gap: 6, marginBottom: 8 }}>
              <input value={p} onChange={e => updatePat(i, e.target.value)} placeholder={i === 0 ? "e.g. go.themommy.news/kp" : "another pattern..."} style={{ flex: 1, padding: "10px 12px", background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, fontFamily: MONO, fontSize: 13, outline: "none", boxSizing: "border-box" }} />
              {patterns.length > 1 && <button onClick={() => removePat(i)} style={{ background: C.redDim, color: C.red, border: "none", borderRadius: 8, padding: "0 10px", cursor: "pointer", fontSize: 16, fontWeight: 700 }}>×</button>}
            </div>
          ))}
          <button onClick={addPat} style={{ background: "none", border: `1px dashed ${C.border}`, borderRadius: 8, color: C.dim, padding: "8px 12px", width: "100%", cursor: "pointer", fontFamily: FONT, fontSize: 12, marginBottom: 8 }}>+ Add Another Pattern</button>
          <p style={{ fontSize: 10, color: C.dim, marginBottom: 20 }}>Each pattern matches any click URL containing that text.</p>

          <div style={{ borderTop: `1px solid ${C.border}`, paddingTop: 20, marginBottom: 16 }}>
            <p style={{ fontSize: 14, fontWeight: 600, color: C.text, marginBottom: 16 }}>Contract (optional)</p>
            <PackageSelector selected={pkgTier} onChange={handleTierChange} />
            {pkgTier !== "custom" && (
              <>
                <Input label="Contract Name" value={contractName} onChange={e => setContractName(e.target.value)} />
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <Input label="Total Price ($)" type="number" value={price} onChange={e => setPrice(e.target.value)} />
                  <Input label="Number of Runs" type="number" value={totalRuns} onChange={e => setTotalRuns(e.target.value)} />
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <Input label="Start Date" type="date" value={startDate} onChange={e => handleStartChange(e.target.value)} />
                  <Input label="End Date" type="date" value={endDate} onChange={e => setEndDate(e.target.value)} />
                </div>
                {tc && pricingCfg?.takeoverPerEmail > 0 && (
                  <button onClick={() => { setTakeover(!takeover); if (!takeover) setPrice((parseFloat(price) || 0) + takeoverCost); else setPrice(Math.max(0, (parseFloat(price) || 0) - takeoverCost)); }} style={{
                    display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", width: "100%",
                    background: takeover ? C.greenDim : C.bg, border: `1px solid ${takeover ? "rgba(52,211,153,0.3)" : C.border}`,
                    borderRadius: 8, cursor: "pointer", transition: "all 0.15s", marginBottom: 8,
                  }}>
                    <div style={{ width: 36, height: 20, borderRadius: 10, padding: 2, background: takeover ? C.green : C.dim, transition: "background 0.15s", display: "flex", alignItems: "center" }}>
                      <div style={{ width: 16, height: 16, borderRadius: 8, background: "#fff", transform: takeover ? "translateX(16px)" : "translateX(0)", transition: "transform 0.15s" }} />
                    </div>
                    <span style={{ fontSize: 13, fontWeight: 600, color: takeover ? C.green : C.muted }}>Newsletter Takeover</span>
                    <span style={{ fontSize: 12, color: C.dim, marginLeft: "auto" }}>+${takeoverCost.toLocaleString()}</span>
                  </button>
                )}
                {tc && tc.polls > 0 && (
                  <div style={{ padding: "8px 14px", background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                    <span style={{ fontSize: 13, color: C.muted }}>Custom Polls</span>
                    <span style={{ fontSize: 13, fontWeight: 600, color: C.accent }}>{tc.polls} included</span>
                  </div>
                )}
              </>
            )}
          </div>

          <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
            <Btn onClick={onCancel} color={C.muted} bg="transparent" style={{ border: `1px solid ${C.border}` }}>Cancel</Btn>
            <Btn onClick={handleSave} color={C.white} bg={C.accent} disabled={!name.trim()}>Add</Btn>
          </div>
        </div>
      );
    }

            <MiniToggle on={showCpc} onToggle={() => setShowCpc(!showCpc)} label={showCpc ? "CPC visible to sponsor" : "CPC hidden"} />
            <p style={{ fontSize: 10, color: C.dim, marginTop: 2 }}>Controls which cost metrics appear in the sponsor view.</p>

      { id: "d1-12", emailName: "Labor Day Family Plans", sendDate: "2025-08-11", totalOpens: 27400, totalClicks: 352, description: "Final campaign placement", sponsorId: "demo", contractId: "demo-c1" },
    ];

    const DEMO_C2_RUNS = [
      { id: "d2-1", emailName: "Back-to-School Essentials Guide", sendDate: "2025-09-08", totalOpens: 27420, totalClicks: 356, description: "Hero feature with product carousel", sponsorId: "demo", contractId: "demo-c2" },
      { id: "d2-2", emailName: "Fall Family Activities Roundup", sendDate: "2025-09-22", totalOpens: 26890, totalClicks: 312, description: "Primary placement with seasonal tie-in", sponsorId: "demo", contractId: "demo-c2" },
      { id: "d2-3", emailName: "Halloween Costume Hacks", sendDate: "2025-10-13", totalOpens: 28100, totalClicks: 389, description: "Themed placement with contest CTA", sponsorId: "demo", contractId: "demo-c2" },
      { id: "d2-4", emailName: "Holiday Gift Guide Preview", sendDate: "2025-11-03", totalOpens: 29340, totalClicks: 421, description: "Gift guide integration", sponsorId: "demo", contractId: "demo-c2" },
      { id: "d2-5", emailName: "Thanksgiving Travel Tips", sendDate: "2025-11-17", totalOpens: 27650, totalClicks: 345, description: "Travel essentials feature", sponsorId: "demo", contractId: "demo-c2" },
      { id: "d2-6", emailName: "Stocking Stuffer Ideas", sendDate: "2025-12-01", totalOpens: 30200, totalClicks: 438, description: "Holiday shopping guide placement", sponsorId: "demo", contractId: "demo-c2" },
      { id: "d2-7", emailName: "New Year Family Goals", sendDate: "2026-01-06", totalOpens: 28900, totalClicks: 362, description: "New year wellness tie-in", sponsorId: "demo", contractId: "demo-c2" },
    ];

    const DEMO_CONTRACTS = [
      {
        id: "demo-c1", name: "Awareness Campaign · 12 Issues", sponsorId: "demo",
        startDate: "2025-03-01", endDate: "2025-09-01", totalRuns: 12, isActive: false,
        showCpmToSponsor: true, showCpcToSponsor: false,
        exclusivePlacement: false, primaryPlacement: false, categoryExclusivity: false,
        pricingNotes: "", runs: DEMO_C1_RUNS, costMetrics: { cpm: 22.04 },
      },
      {
        id: "demo-c2", name: "Growth Partnership · 12 Issues", sponsorId: "demo",
        startDate: "2025-09-01", endDate: "2026-03-01", totalRuns: 12, isActive: true,
        showCpmToSponsor: true, showCpcToSponsor: false,
        exclusivePlacement: false, primaryPlacement: true, categoryExclusivity: true,
        pricingNotes: "", runs: DEMO_C2_RUNS, costMetrics: { cpm: 22.04 },
      },
    ];

    function DemoSponsorPage() {
      const [bannerVisible, setBannerVisible] = useState(true);
      const sponsor = { id: "demo", name: "Sample Partner", patterns: [], showCostToSponsor: true, oneOffShowCpm: false, oneOffShowCpc: false };
      const config = { publicationName: "The Mommy", publicationUrl: "themommy.news", campaignUrl: "https://sponsors.themommy.news/packages" };
      const activeContract = DEMO_CONTRACTS.find(c => c.isActive);
      const allRuns = [...DEMO_C1_RUNS, ...DEMO_C2_RUNS];

      return (
        <div>
          {bannerVisible && (
            <div style={{ background: "#EFF6FF", borderBottom: "1px solid #BFDBFE", padding: "10px 24px", textAlign: "center", fontSize: 13, color: "#1E40AF", fontFamily: FONT, position: "relative" }}>
              📊 Dashboard Demo — Sample data for preview purposes
              <button onClick={() => setBannerVisible(false)} style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: "#1E40AF", cursor: "pointer", fontSize: 16, padding: 4 }}>×</button>
            </div>
          )}
          <SponsorView sponsor={sponsor} runs={activeContract.runs} totals={{ opens: 198500, clicks: 2623, ctr: 1.32 }} contract={activeContract} costMetrics={activeContract.costMetrics} onBack={null} onQuickSync={() => {}} config={config} allContracts={DEMO_CONTRACTS} allRuns={allRuns} isDemo={true} />
        </div>
      );
    }

    // ─── Public Sponsor Page ────────────────────────────────────
    function PublicSponsorPage({ shareToken }) {
      const [data, setData] = useState(null);
      const [err, setErr] = useState(null);
      const [loading, setLoading] = useState(true);
      const width = useWindowWidth();
      const isMobile = width <= MOBILE;

      const fetchData = useCallback(async (silent) => {
        if (!silent) setLoading(true);
        try {
          const res = await fetch(`/api/sponsor-data?token=${encodeURIComponent(shareToken)}`);
          if (!res.ok) { setErr(res.status === 404 ? "not_found" : "error"); setLoading(false); return; }
          const d = await res.json();
          setData(d);
          setErr(null);
        } catch { setErr("error"); }
        setLoading(false);
      }, [shareToken]);

      useEffect(() => {
        fetchData(false);
        const iv = setInterval(() => fetchData(true), 5 * 60 * 1000);
        return () => clearInterval(iv);
      }, [fetchData]);

      if (loading) return (
        <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: C.bg }}>
          <div style={{ width: 56, height: 56, borderRadius: 16, background: "linear-gradient(135deg, #4F8FF7, #34D399)", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 16, animation: "pulse 2s ease-in-out infinite" }}>
            <span style={{ fontSize: 28, fontWeight: 700, color: "#fff" }}>S</span>
          </div>
          <p style={{ color: C.muted, fontFamily: FONT, fontSize: 14 }}>Loading campaign data...</p>
          <style dangerouslySetInnerHTML={{ __html: "@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }" }} />
        </div>
      );

      if (err) return (
        <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: C.bg }}>
          <div style={{ width: 56, height: 56, borderRadius: 16, background: C.card, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 16, border: `1px solid ${C.border}` }}>
            <span style={{ fontSize: 28, fontWeight: 700, color: C.dim }}>S</span>
          </div>
          <p style={{ color: C.muted, fontFamily: FONT, fontSize: 15, fontWeight: 500 }}>This campaign link is no longer active</p>
          <p style={{ color: C.dim, fontFamily: FONT, fontSize: 13, marginTop: 6 }}>Contact the publisher for an updated link</p>
        </div>
      );

      const sponsor = { id: "public", name: data.sponsorName, patterns: [], showCostToSponsor: data.showCostToSponsor ?? false, oneOffShowCpm: data.oneOffShowCpm ?? false, oneOffShowCpc: data.oneOffShowCpc ?? false };
      const config = { publicationName: data.publicationName || "", publicationUrl: data.publicationUrl || "", campaignUrl: data.campaignUrl || "" };

      // New multi-contract format
      if (data.contracts) {
        const allContracts = (data.contracts || []).map(c => ({
          ...c, sponsorId: "public",
          runs: (c.runs || []).map(r => ({ ...r, sponsorId: "public", contractId: c.id, lastSync: data.publishedAt })),
        }));
        const kvUnassigned = (data.unassignedRuns || []).map(r => ({ ...r, sponsorId: "public", contractId: null, lastSync: data.publishedAt }));
        const allRuns = [...allContracts.flatMap(c => c.runs), ...kvUnassigned].sort((a, b) => new Date(b.sendDate) - new Date(a.sendDate));
        const activeC = allContracts.find(c => c.isActive);
        const defaultRuns = activeC ? activeC.runs : allRuns;
        const dTot = { opens: defaultRuns.reduce((s, r) => s + (r.totalOpens || 0), 0), clicks: defaultRuns.reduce((s, r) => s + (r.totalClicks || 0), 0) };
        dTot.ctr = dTot.opens > 0 ? (dTot.clicks / dTot.opens) * 100 : 0;
        return (
          <div>
            <SponsorView sponsor={sponsor} runs={defaultRuns} totals={dTot} contract={activeC || null} costMetrics={activeC?.costMetrics || null} onBack={null} onQuickSync={() => {}} config={config} allContracts={allContracts} allRuns={allRuns} shareToken={shareToken} />
            {data.publishedAt && <div style={{ textAlign: "center", padding: "12px 0 24px", color: C.dim, fontSize: 12, fontFamily: FONT }}>Last updated {timeAgo(data.publishedAt)}</div>}
          </div>
        );
      }

      // Legacy flat format (backward compat)
      const runs = (data.runs || []).map(r => ({
        ...r, sponsorId: "public", contractId: data.contract ? "pub-contract" : null,
        lastSync: data.publishedAt,
      }));
      const totals = data.totals || { opens: 0, clicks: 0, ctr: 0 };
      const contract = data.contract ? { ...data.contract, id: "pub-contract", sponsorId: "public", isActive: true } : null;
      const costMetrics = data.costMetrics || null;

      return (
        <div>
          <SponsorView sponsor={sponsor} runs={runs} totals={totals} contract={contract} costMetrics={costMetrics} onBack={null} onQuickSync={() => {}} config={config} shareToken={shareToken} />
          {data.publishedAt && <div style={{ textAlign: "center", padding: "12px 0 24px", color: C.dim, fontSize: 12, fontFamily: FONT }}>Last updated {timeAgo(data.publishedAt)}</div>}
        </div>
      );
    }

    // ─── Root (route-based entry) ─────────────────────────────────
    function Root() {
      const route = getRoute();
      if (route.mode === "demo") return <DemoSponsorPage />;
      if (route.mode === "sponsor") return <PublicSponsorPage shareToken={route.shareToken} />;
      return <App />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>
</body>
