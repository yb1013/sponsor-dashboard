        if (p.contractId && contracts.some(c => c.id === p.contractId)) {
          if (!campaignGroups[p.contractId]) campaignGroups[p.contractId] = [];
          campaignGroups[p.contractId].push(p);
        } else {
          otherPlacements.push(p);
        }
      });
      // Sort within each group by run number then date
      Object.values(campaignGroups).forEach(arr => arr.sort((a, b) => (a.runNumber || 999) - (b.runNumber || 999)));
      otherPlacements.sort((a, b) => {
        const pri = { changes_requested: 0, pending_review: 1, draft: 2, approved: 3, completed: 4 };
        return (pri[a.status] ?? 5) - (pri[b.status] ?? 5) || new Date(a.scheduledDate || 0) - new Date(b.scheduledDate || 0);
      });

      // Campaign info for dropdowns
      const campaignOptions = contracts.map(c => {
        const used = placements.filter(p => p.contractId === c.id && p.status !== "placeholder").length;
        return { id: c.id, name: c.name, totalRuns: c.totalRuns || 0, remaining: Math.max(0, (c.totalRuns || 0) - used), isActive: c.isActive };
      });
      const getUsedRuns = (contractId) => {
        return placements.filter(p => p.contractId === contractId).map(p => ({
          runNumber: p.runNumber, status: p.status, scheduledDate: p.scheduledDate, placementId: p.placementId,
        }));
      };

      const approvedIds = placements.filter(p => p.status === "approved").map(p => p.placementId);
      const anyBatchSelected = Object.keys(batchSelect).some(k => batchSelect[k]);

      const renderPlacementCard = (p) => {
        const sc = statusColor[p.status] || C.dim;
        const full = expandedData[p.placementId];
        const ri = replaceImage[p.placementId];
        const lastChange = full?.changeHistory?.length > 0 ? full.changeHistory[full.changeHistory.length - 1] : null;
        const runLabel = p.runNumber ? `Run ${p.runNumber}${p.totalRuns ? ` of ${p.totalRuns}` : ""}` : (p.headline || "Untitled");
        const isPlaceholder = p.status === "placeholder";

        if (isPlaceholder) {
          return (
            <div key={p.placementId} onClick={() => {
              setEditingPlaceholder(p);
              setNewDate(p.scheduledDate || ""); setNewHeadline(p.headline || ""); setNewNotes("");
              setSelCampaign(campaignOptions.find(c => c.id === p.contractId) || null);
              setSelRunNumber(p.runNumber ? String(p.runNumber) : "");
              window.scrollTo({ top: 0, behavior: "smooth" });
            }} style={{ background: C.card, borderRadius: 14, border: `2px dashed ${C.border}`, padding: isMobile ? 14 : 18, cursor: "pointer", opacity: 0.7 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ width: 24, height: 24, borderRadius: 12, border: `2px dashed ${C.dim}`, display: "inline-flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }} />
                <div>
                  <p style={{ fontSize: 14, fontWeight: 600, color: C.dim }}>{runLabel}</p>
                  <p style={{ fontSize: 12, color: C.dim }}>{fmtD(p.scheduledDate)} — <em>No creative yet — click to add content</em></p>
                </div>
              </div>
            </div>
          );
        }

        return (
          <div key={p.placementId} style={{ background: C.card, borderRadius: 14, border: `1px solid ${C.border}`, padding: isMobile ? 16 : 20, borderLeft: `3px solid ${sc}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ color: sc, fontSize: 13, fontWeight: 700 }}>{statusIcon[p.status]} {statusLabel[p.status]}</span>
                {p.status === "pending_review" && p.submittedAt && <span style={{ fontSize: 11, color: C.dim }}>— Sent {new Date(p.submittedAt).toLocaleDateString("en-US", { month: "short", day: "numeric" })}</span>}
                {p.status === "approved" && p.approvedAt && <span style={{ fontSize: 11, color: C.dim }}>— {new Date(p.approvedAt).toLocaleDateString("en-US", { month: "short", day: "numeric" })}</span>}
                {p.version > 1 && <span style={{ fontSize: 10, padding: "2px 6px", borderRadius: 4, background: "rgba(59,130,246,0.15)", color: "#3B82F6", fontWeight: 600 }}>v{p.version}</span>}
              </div>
              {p.status === "approved" && approvedIds.length > 1 && (
                <label style={{ display: "flex", alignItems: "center", gap: 4, cursor: "pointer", fontSize: 11, color: C.dim }}>
                  <input type="checkbox" checked={!!batchSelect[p.placementId]} onChange={e => setBatchSelect(s => ({ ...s, [p.placementId]: e.target.checked }))} />
                </label>
              )}
            </div>

            <div style={{ display: "flex", gap: 16, flexDirection: isMobile ? "column" : "row" }}>
              {/* Thumbnail / content preview */}
              <div style={{ flexShrink: 0 }}>
                {(p.contentType === "html" || full?.contentType === "html") ? (
                  <div onClick={() => { setExpandedId(p.placementId); if (!full) fetchFull(p.placementId); }} style={{ width: p.status === "completed" ? 120 : 200, height: p.status === "completed" ? 80 : 130, background: "linear-gradient(135deg, #fdf2f4, #f0f4ff)", borderRadius: 8, border: `1px solid ${C.border}`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", cursor: "pointer", gap: 6 }}>
                    <span style={{ fontSize: 24 }}>&#128196;</span>
                    <span style={{ fontSize: 11, fontWeight: 600, color: C.accent }}>Newsletter Content</span>
                  </div>
                ) : (ri || (full && full.imageData)) ? (
                  <ImageViewer src={ri || full.imageData} style={{ width: p.status === "completed" ? 120 : 200, borderRadius: 8, border: `1px solid ${C.border}` }} />
                ) : (
                  <div onClick={() => { setExpandedId(p.placementId); if (!full) fetchFull(p.placementId); }} style={{ width: p.status === "completed" ? 120 : 200, height: p.status === "completed" ? 80 : 130, background: C.bg, borderRadius: 8, border: `1px solid ${C.border}`, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>
                    <span style={{ fontSize: 11, color: C.dim }}>{full === undefined ? "Click to load" : "No image"}</span>
                  </div>
                )}
              </div>
              <div style={{ flex: 1 }}>
                <p style={{ fontSize: 15, fontWeight: 600, marginBottom: 2 }}>{runLabel}</p>
                {p.campaignName && <p style={{ fontSize: 12, color: C.dim, marginBottom: 4 }}>{p.campaignName}</p>}
                <p style={{ fontSize: 12, color: C.dim, marginBottom: 8 }}>{fmtD(p.scheduledDate)}</p>

                {/* Changes requested feedback */}
                {p.status === "changes_requested" && lastChange && (
                  <div style={{ background: C.redDim, borderRadius: 8, padding: 12, marginBottom: 12, border: `1px solid rgba(248,113,113,0.2)` }}>
                    <p style={{ fontSize: 11, fontWeight: 600, color: C.red, marginBottom: 4 }}>Sponsor feedback:</p>
                    <p style={{ fontSize: 13, color: C.text, fontStyle: "italic" }}>"{lastChange.message}"</p>
                  </div>
                )}

                {full?.notes && <p style={{ fontSize: 12, color: C.dim, fontStyle: "italic", marginBottom: 8 }}>Notes: {full.notes}</p>}

                {/* Action buttons by status */}
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 4 }}>
                  {p.status === "draft" && (
                    <React.Fragment>
                      <Btn onClick={() => { setExpandedId(p.placementId); if (!full) fetchFull(p.placementId); }} color={C.accent} bg={C.accentDim} small>Edit</Btn>
                      <Btn onClick={() => doAction("submit", p.placementId)} color={C.white} bg={C.accent} small>Send for Review →</Btn>
                      <Btn onClick={() => setConfirmDelete(p.placementId)} color={C.red} bg={C.redDim} small>Delete</Btn>
                    </React.Fragment>
                  )}
                  {p.status === "pending_review" && (
                    <Btn onClick={() => doAction("recall", p.placementId)} color={C.amber} bg={C.amberDim} small>Recall</Btn>
                  )}
                  {p.status === "changes_requested" && (
                    <React.Fragment>
                      {(p.contentType === "html" || full?.contentType === "html") ? (
                        <Btn onClick={() => { setExpandedId(p.placementId); if (!full) fetchFull(p.placementId); }} color={C.accent} bg={C.accentDim} small>Replace Content</Btn>
                      ) : (
                        <Btn onClick={() => { if (!replaceRefs.current[p.placementId]) replaceRefs.current[p.placementId] = document.createElement("input"); const inp = replaceRefs.current[p.placementId]; inp.type = "file"; inp.accept = "image/*"; inp.onchange = (ev) => handleReplaceFile(p.placementId, ev.target.files[0]); inp.click(); }} color={C.accent} bg={C.accentDim} small>Replace Image</Btn>
                      )}
                      <Btn onClick={() => doResubmit(p.placementId)} color={C.white} bg={C.accent} small>Resubmit for Review →</Btn>
                    </React.Fragment>
                  )}
                  {p.status === "approved" && (
                    <Btn onClick={() => doAction("complete", p.placementId)} color={C.white} bg={C.green} small>Mark as Completed</Btn>
                  )}
                </div>
              </div>
            </div>

            {/* Delete confirmation */}
            {confirmDelete === p.placementId && (
              <div style={{ marginTop: 12, padding: 12, background: C.redDim, borderRadius: 8, display: "flex", gap: 8, alignItems: "center" }}>
                <span style={{ fontSize: 13, color: C.red }}>Delete this draft?</span>
                <Btn onClick={() => { doAction("delete", p.placementId); setConfirmDelete(null); }} color={C.white} bg={C.red} small>Yes, Delete</Btn>
                <Btn onClick={() => setConfirmDelete(null)} color={C.dim} bg={C.card} small>Cancel</Btn>
              </div>
            )}
          </div>
        );
      };

      if (loading) return null;

      return (
        <div style={{ marginTop: 32 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <h3 style={{ fontSize: 15, fontWeight: 600, color: C.muted }}>Placements{counts.changes_requested > 0 && <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", marginLeft: 8, minWidth: 18, height: 18, borderRadius: 9, background: C.red, color: "#fff", fontSize: 10, fontWeight: 700, padding: "0 5px", lineHeight: 1 }}>{counts.changes_requested}</span>}</h3>
            <span style={{ fontSize: 12, color: C.dim }}>{placements.length} placement{placements.length !== 1 ? "s" : ""}</span>
          </div>

          {/* Status pipeline */}
          <div style={{ display: "flex", gap: 0, marginBottom: 20, background: C.card, borderRadius: 10, border: `1px solid ${C.border}`, overflow: "hidden", flexWrap: "wrap" }}>
            {["placeholder", "draft", "pending_review", "changes_requested", "approved", "completed"].map((s, i, arr) => (
              <button key={s} onClick={() => setStatusFilter(statusFilter === s ? null : s)} style={{
                flex: 1, minWidth: isMobile ? "33%" : 0, padding: "10px 8px", background: statusFilter === s ? "rgba(79,143,247,0.1)" : "transparent",
                border: "none", borderRight: i < arr.length - 1 && !isMobile ? `1px solid ${C.border}` : "none", cursor: "pointer", fontFamily: FONT, textAlign: "center",
              }}>
                <span style={{ fontSize: 18, fontWeight: 700, color: statusColor[s], display: "block" }}>{counts[s]}</span>
                <span style={{ fontSize: 10, color: C.dim, textTransform: "uppercase", letterSpacing: 0.5 }}>{statusLabel[s].replace("_", " ")}</span>
              </button>
            ))}
          </div>

          {/* New placement form */}
          <div style={{ background: C.card, borderRadius: 14, border: `1px solid ${C.border}`, padding: isMobile ? 16 : 24, marginBottom: 24 }}>
            <p style={{ fontSize: 14, fontWeight: 600, marginBottom: 16 }}>+ New Placement</p>

            {/* Content mode toggle */}
            <div style={{ display: "flex", gap: 0, marginBottom: 16, background: C.bg, borderRadius: 8, border: `1px solid ${C.border}`, overflow: "hidden" }}>
              {[["html", "Paste Newsletter Content"], ["image", "Upload Image"]].map(([m, label]) => (
                <button key={m} onClick={() => {
                  if (m === contentMode) return;
                  if ((contentMode === "html" && newHtml) || (contentMode === "image" && newImage)) {
                    if (!confirm("Switching modes will clear the current content. Continue?")) return;
                  }
                  setContentMode(m); setNewImage(null); setNewHtml(""); setNewPreviewUrl(""); setHtmlWarning(null); setImgError(null);
                }} style={{
                  flex: 1, padding: "8px 12px", border: "none", cursor: "pointer", fontFamily: FONT, fontSize: 12, fontWeight: 600,
                  background: contentMode === m ? C.accent : "transparent", color: contentMode === m ? "#fff" : C.dim, transition: "all 0.15s",
                }}>{label}</button>
              ))}
            </div>

            {/* Mode A: Paste HTML */}
            {contentMode === "html" && (
              <div>
                {!newHtml ? (
                  <div
                    style={{
                      border: `2px dashed #E8909C`, borderRadius: 12, padding: "40px 20px", textAlign: "center",
                      background: "rgba(232,144,156,0.05)",
                    }}
                  >
                    <p style={{ color: C.muted, fontSize: 14, marginBottom: 4 }}>Paste your newsletter content anywhere on this page (Ctrl+V)</p>
                    <p style={{ color: C.dim, fontSize: 12 }}>Copy from the browser preview of your newsletter, then press Ctrl+V</p>
                  </div>
                ) : (
                  <div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", background: C.greenDim, borderRadius: 8, marginBottom: 12 }}>
                      <span style={{ fontSize: 13, color: C.green, fontWeight: 600 }}>Newsletter content pasted &#10003;</span>
                      <button onClick={() => { setNewHtml(""); setHtmlWarning(null); }} style={{ marginLeft: "auto", background: "none", border: "none", color: C.dim, cursor: "pointer", fontFamily: FONT, fontSize: 11 }}>Clear</button>
                      <button onClick={() => { setNewHtml(""); setHtmlWarning(null); }} style={{ background: "none", border: "none", color: C.accent, cursor: "pointer", fontFamily: FONT, fontSize: 11 }}>Replace</button>
                    </div>
                    <iframe
                      sandbox="allow-scripts"
                      srcDoc={buildSrcdocHtml(newHtml, "admin-preview", { linksClickable: false })}
                      style={{ width: "100%", maxWidth: 600, border: `1px solid ${C.border}`, borderRadius: 8, maxHeight: 600, display: "block", background: "#fff" }}
                      data-placement-id="admin-preview"
                    />
                  </div>
                )}
                {htmlWarning && <p style={{ color: C.amber, fontSize: 12, marginTop: 8 }}>{htmlWarning}</p>}
              </div>
            )}

            {/* Mode B: Upload Image */}
            {contentMode === "image" && (
              <div>
                {!newImage ? (
                  <div
                    onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                    onDragLeave={() => setDragOver(false)}
                    onDrop={handleDrop}
                    onClick={() => fileRef.current?.click()}
                    style={{
                      border: `2px dashed ${dragOver ? C.accent : C.border}`, borderRadius: 12, padding: "40px 20px", textAlign: "center",
                      cursor: "pointer", transition: "border-color 0.15s", background: dragOver ? "rgba(79,143,247,0.05)" : "transparent",
                    }}
                  >
                    <p style={{ color: C.muted, fontSize: 14, marginBottom: 4 }}>Drag & drop placement image here</p>
                    <p style={{ color: C.dim, fontSize: 12 }}>or click to browse</p>
                    <p style={{ color: C.dim, fontSize: 11, marginTop: 8 }}>PNG, JPG — will be compressed to JPEG</p>
                    <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => handleFile(e.target.files[0])} />
                  </div>
                ) : (
                  <div style={{ marginBottom: 16 }}>
                    <ImageViewer src={newImage} style={{ maxWidth: 400, width: "100%", borderRadius: 10, border: `1px solid ${C.border}` }} />
                    <button onClick={() => setNewImage(null)} style={{ display: "block", marginTop: 8, background: "none", border: "none", color: C.dim, cursor: "pointer", fontFamily: FONT, fontSize: 12 }}>Remove image</button>
                  </div>
                )}
                {imgError && <p style={{ color: C.red, fontSize: 13, marginTop: 8 }}>{imgError}</p>}
                <div style={{ marginTop: 12 }}>
                  <label style={{ fontSize: 11, color: C.dim, display: "block", marginBottom: 4 }}>Web Preview URL (optional)</label>
                  <input value={newPreviewUrl} onChange={e => setNewPreviewUrl(e.target.value)} placeholder="https://www.beehiiv.com/..." style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: `1px solid ${C.border}`, background: C.bg, color: C.text, fontFamily: FONT, fontSize: 13 }} />
                  <p style={{ fontSize: 10, color: C.dim, marginTop: 3 }}>Link to the newsletter web preview so the sponsor can click through links</p>
                </div>
              </div>
            )}

            {/* Campaign + Run selectors */}
            <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "3fr 2fr", gap: 12, marginTop: 16 }}>
              <div>
                <label style={{ fontSize: 11, color: C.dim, display: "block", marginBottom: 4 }}>Campaign</label>
                <div style={{ position: "relative" }}>
                  <input
                    list="campaign-list"
                    value={selCampaign ? `${selCampaign.name} — ${selCampaign.totalRuns} placements (${selCampaign.remaining} remaining)` : customCampaign}
                    onChange={e => {
                      const val = e.target.value;
                      const match = campaignOptions.find(c => val.startsWith(c.name + " —") || val === c.name);
                      if (match) { setSelCampaign(match); setCustomCampaign(""); }
                      else { setSelCampaign(null); setCustomCampaign(val); }
                    }}
                    onFocus={e => { if (selCampaign) { e.target.value = ""; e.target.select(); } }}
                    placeholder="Select or type campaign name"
                    style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: `1px solid ${C.border}`, background: C.bg, color: C.text, fontFamily: FONT, fontSize: 13 }}
                  />
                  <datalist id="campaign-list">
                    {campaignOptions.map(c => (
                      <option key={c.id} value={`${c.name} — ${c.totalRuns} placements (${c.remaining} remaining)`} />
                    ))}
                  </datalist>
                </div>
              </div>
              <div>
                <label style={{ fontSize: 11, color: C.dim, display: "block", marginBottom: 4 }}>Run #</label>
                {selCampaign ? (
                  <select value={selRunNumber} onChange={e => setSelRunNumber(e.target.value)} style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: `1px solid ${C.border}`, background: C.bg, color: C.text, fontFamily: FONT, fontSize: 13 }}>
                    <option value="">Select run</option>
                    {Array.from({ length: selCampaign.totalRuns }, (_, i) => i + 1).map(n => {
                      const used = getUsedRuns(selCampaign.id).find(r => r.runNumber === n);
                      return <option key={n} value={n}>{n} of {selCampaign.totalRuns}{used ? ` (${fmtD(used.scheduledDate)} — ${statusLabel[used.status] || used.status})` : ""}</option>;
                    })}
                  </select>
                ) : (
                  <input type="number" min="1" value={selRunNumber} onChange={e => setSelRunNumber(e.target.value)} placeholder="#" style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: `1px solid ${C.border}`, background: C.bg, color: C.text, fontFamily: FONT, fontSize: 13 }} />
                )}
              </div>
            </div>

            {/* Initialize schedule button */}
            {selCampaign && !campaignGroups[selCampaign.id]?.length && (
              <div style={{ marginTop: 12 }}>
                {!showInitSchedule ? (
                  <button onClick={() => setShowInitSchedule(true)} style={{ padding: "6px 14px", background: "none", border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 12, color: C.muted, cursor: "pointer", fontFamily: FONT }}>Initialize Schedule for This Campaign →</button>
                ) : (
                  <div style={{ padding: 16, background: C.bg, borderRadius: 10, border: `1px solid ${C.border}` }}>
                    <p style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Create placeholder dates for all {selCampaign.totalRuns} runs?</p>
                    <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 12, marginBottom: 12 }}>
                      <div>
                        <label style={{ fontSize: 11, color: C.dim, display: "block", marginBottom: 4 }}>Start date</label>
                        <input type="date" value={initStartDate} onChange={e => setInitStartDate(e.target.value)} style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: `1px solid ${C.border}`, background: C.card, color: C.text, fontFamily: FONT, fontSize: 13 }} />
                      </div>
                      <div>
                        <label style={{ fontSize: 11, color: C.dim, display: "block", marginBottom: 4 }}>Frequency</label>
                        <select value={initFrequency} onChange={e => setInitFrequency(e.target.value)} style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: `1px solid ${C.border}`, background: C.card, color: C.text, fontFamily: FONT, fontSize: 13 }}>
                          <option value="every_send">Every send (3x/week)</option>
                          <option value="2x_week">2x per week</option>
                          <option value="1x_week">1x per week</option>
                          <option value="every_other_week">Every other week</option>
                          <option value="1x_month">1x per month</option>
                        </select>
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <Btn onClick={initializeSchedule} color={C.white} bg={C.accent} disabled={initSaving || !initStartDate} small>{initSaving ? "Creating..." : "Create Placeholders"}</Btn>
                      <Btn onClick={() => setShowInitSchedule(false)} color={C.dim} bg={C.card} small>Cancel</Btn>
                    </div>
                  </div>
                )}
              </div>
            )}

            <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 12, marginTop: 16 }}>
              <div>
                <label style={{ fontSize: 11, color: C.dim, display: "block", marginBottom: 4 }}>Scheduled Date</label>
                <input type="date" value={newDate} onChange={e => setNewDate(e.target.value)} style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: `1px solid ${C.border}`, background: C.bg, color: C.text, fontFamily: FONT, fontSize: 13 }} />
              </div>
              <div>
                <label style={{ fontSize: 11, color: C.dim, display: "block", marginBottom: 4 }}>Headline (optional)</label>
                <input value={newHeadline} onChange={e => setNewHeadline(e.target.value)} placeholder="Optional label" style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: `1px solid ${C.border}`, background: C.bg, color: C.text, fontFamily: FONT, fontSize: 13 }} />
              </div>
            </div>
            <div style={{ marginTop: 12 }}>
              <label style={{ fontSize: 11, color: C.dim, display: "block", marginBottom: 4 }}>Notes (internal)</label>
              <input value={newNotes} onChange={e => setNewNotes(e.target.value)} placeholder="Internal notes" style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: `1px solid ${C.border}`, background: C.bg, color: C.text, fontFamily: FONT, fontSize: 13 }} />
            </div>
            <div style={{ display: "flex", gap: 10, marginTop: 16, flexWrap: "wrap" }}>
              {editingPlaceholder ? (
                <React.Fragment>
                  <Btn onClick={() => fillPlaceholder(editingPlaceholder)} color={C.white} bg={C.accent} disabled={saving || (contentMode === "image" ? !newImage : !newHtml)}>Save Content to Placeholder</Btn>
                  <Btn onClick={() => { setEditingPlaceholder(null); setNewImage(null); setNewHtml(""); setNewDate(""); setNewHeadline(""); setNewNotes(""); }} color={C.dim} bg={C.bg}>Cancel</Btn>
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <Btn onClick={() => createPlacement(false)} color={C.muted} bg={C.bg} disabled={saving || (contentMode === "image" ? !newImage : !newHtml)}>Save as Draft</Btn>
                  <Btn onClick={() => createPlacement(true)} color={C.white} bg={C.accent} disabled={saving || (contentMode === "image" ? !newImage : !newHtml)}>Send for Review →</Btn>
                </React.Fragment>
              )}
            </div>
          </div>

          {/* Batch complete */}
          {approvedIds.length > 1 && (
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 16 }}>
              <Btn onClick={doBatchComplete} color={C.white} bg={C.green} disabled={!anyBatchSelected} small>Mark Selected as Completed</Btn>
              <span style={{ fontSize: 11, color: C.dim }}>Select approved placements below</span>
            </div>
          )}

          {/* Campaign-grouped placement cards */}
          {contracts.map(c => {
            const allItems = campaignGroups[c.id];
            if (!allItems || allItems.length === 0) return null;
            const items = statusFilter ? allItems.filter(p => p.status === statusFilter) : allItems;
            if (items.length === 0) return null;
            const filled = allItems.filter(p => p.status !== "placeholder").length;
            return (
              <div key={c.id} style={{ marginBottom: 24 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                  <p style={{ fontSize: 14, fontWeight: 700, color: C.muted }}>{c.name}</p>
                  <span style={{ fontSize: 12, color: C.dim }}>— {filled} of {c.totalRuns || allItems.length} runs filled</span>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {items.map(p => renderPlacementCard(p))}
                </div>
              </div>
            );
          })}

          {/* Other placements (no matching campaign) */}
          {(() => {
            const filteredOther = statusFilter ? otherPlacements.filter(p => p.status === statusFilter) : otherPlacements;
            return filteredOther.length > 0 && (
            <div style={{ marginBottom: 24 }}>
              {Object.keys(campaignGroups).length > 0 && <p style={{ fontSize: 14, fontWeight: 700, color: C.muted, marginBottom: 10 }}>Other Placements</p>}
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {filteredOther.map(p => renderPlacementCard(p))}
              </div>
            </div>
          );
          })()}

          {placements.length === 0 && <div style={{ textAlign: "center", padding: 32, background: C.card, borderRadius: 14, border: `1px solid ${C.border}` }}><p style={{ color: C.dim, fontSize: 13 }}>No placements yet</p></div>}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // SPONSOR PLACEMENTS (sponsor-facing Placements tab) — Timeline
    // ═══════════════════════════════════════════════════════════════
    function SponsorPlacements({ shareToken, isMobile }) {
      const [placements, setPlacements] = useState([]);
      const [loading, setLoading] = useState(true);
      const [fullData, setFullData] = useState({});
      const [changeFeedback, setChangeFeedback] = useState({});
      const [showChangeForm, setShowChangeForm] = useState(null);
      const [confirmApprove, setConfirmApprove] = useState(null);
      const [approving, setApproving] = useState(null);
      const [submittingChange, setSubmittingChange] = useState(null);
      const [toast, setToast] = useState(null);
      const [expanded, setExpanded] = useState({});
      const [selectedCampaign, setSelectedCampaign] = useState("all");

      const fetchList = async () => {
        try {
          const res = await fetch(`/api/sponsor-placements?action=list&token=${shareToken}`);
          if (res.ok) setPlacements(await res.json());
        } catch {}
        setLoading(false);
      };

      const fetchFull = async (pid) => {
        if (fullData[pid]) return fullData[pid];
        try {
          const res = await fetch(`/api/sponsor-placements?action=get&token=${shareToken}&placementId=${pid}`);
          if (res.ok) { const d = await res.json(); setFullData(p => ({ ...p, [pid]: d })); return d; }
        } catch {}
        return null;
      };

      useEffect(() => { fetchList(); }, []);

      // Auto-fetch + auto-expand review items
      const reviewItems = placements.filter(p => p.status === "pending_review" || p.status === "changes_requested");
      useEffect(() => {
        reviewItems.forEach(p => fetchFull(p.placementId));
        const autoExpand = {};
        reviewItems.forEach(p => { autoExpand[p.placementId] = true; });
        setExpanded(prev => ({ ...prev, ...autoExpand }));
      }, [reviewItems.map(p => p.placementId + p.version).join(",")]);

      // Listen for iframe height messages
      useEffect(() => {
        const handler = (e) => {
          if (e.data?.type === "iframeHeight" && e.data.id && e.data.height) {
            const iframe = document.querySelector(`iframe[data-placement-id="${e.data.id}"]`);
            if (iframe) iframe.style.height = (e.data.height + 32) + "px";
          }
        };
        window.addEventListener("message", handler);
        return () => window.removeEventListener("message", handler);
      }, []);

      const handleApprove = async (pid) => {
        setApproving(pid);
        try {
          const res = await fetch(`/api/sponsor-placements?action=approve&token=${shareToken}&placementId=${pid}`, { method: "POST", headers: { "Content-Type": "application/json" } });
          if (res.ok) {
            setConfirmApprove(null);
            setToast("Approved!");
            setTimeout(() => setToast(null), 2500);
            setTimeout(async () => { await fetchList(); }, 400);
          }
        } catch {}
        setApproving(null);
      };

      const handleRequestChanges = async (pid) => {
        const msg = changeFeedback[pid];
        if (!msg?.trim()) return;
        setSubmittingChange(pid);
        try {
          const res = await fetch(`/api/sponsor-placements?action=request-changes&token=${shareToken}&placementId=${pid}`, {
            method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: msg.trim() }),
          });
          if (res.ok) {
            setShowChangeForm(null);
            setChangeFeedback(p => { const n = { ...p }; delete n[pid]; return n; });
            await fetchList();
          }
        } catch {}
        setSubmittingChange(null);
      };

      const toggleExpand = (pid) => {
        setExpanded(prev => ({ ...prev, [pid]: !prev[pid] }));
        if (!fullData[pid]) fetchFull(pid);
      };

      if (loading) return <div style={{ textAlign: "center", padding: 40, color: C.dim }}><p>Loading...</p></div>;

      const fmtD = (d) => d ? new Date(d + "T00:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric", year: "numeric" }) : "";

      // Campaigns for selector
      const campaigns = {};
      placements.forEach(p => {
        if (p.contractId && p.campaignName) {
          if (!campaigns[p.contractId]) campaigns[p.contractId] = { name: p.campaignName, totalRuns: p.totalRuns || 0, contractId: p.contractId };
        }
      });
      const campaignList = Object.values(campaigns);
      const showCampaignSelector = campaignList.length > 1;

      // Filter placements by selected campaign
      const filtered = selectedCampaign === "all" ? placements : placements.filter(p => p.contractId === selectedCampaign);

      // Review count for banner
      const needsReview = filtered.filter(p => p.status === "pending_review" || p.status === "changes_requested");

      // Progress per campaign
      const getProgress = (items) => {
        const c = { completed: 0, approved: 0, pending_review: 0, changes_requested: 0, placeholder: 0 };
        items.forEach(p => { if (c[p.status] !== undefined) c[p.status]++; });
        return c;
      };

      if (placements.length === 0) return (
        <div style={{ textAlign: "center", padding: isMobile ? 40 : 80 }}>
          <p style={{ fontSize: 15, color: C.muted, lineHeight: 1.6 }}>No placements scheduled yet. Your sponsorship manager will add them as send dates approach.</p>
        </div>
      );

      // Status styling
      const rowIcon = (status) => {
        if (status === "completed") return <span style={{ width: 24, height: 24, borderRadius: 12, background: "#22C55E", display: "inline-flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 14, flexShrink: 0 }}>&#10003;</span>;
        if (status === "pending_review" || status === "changes_requested") return <span style={{ width: 24, height: 24, borderRadius: 12, background: "#E8909C", display: "inline-flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 13, flexShrink: 0 }}>!</span>;
        if (status === "approved") return <span style={{ width: 24, height: 24, borderRadius: 12, border: "2px solid #3B82F6", display: "inline-flex", alignItems: "center", justifyContent: "center", color: "#3B82F6", fontSize: 13, flexShrink: 0 }}>&#10003;</span>;
        return <span style={{ width: 24, height: 24, borderRadius: 12, border: "2px dashed #D1D5DB", display: "inline-flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }} />;
      };
      const rowLabel = (status) => {
        if (status === "completed") return <span style={{ fontSize: 13, color: "#6B7280" }}>Completed</span>;
        if (status === "pending_review" || status === "changes_requested") return <span style={{ fontSize: 13, color: "#E8909C", fontWeight: 700 }}>Needs Your Review</span>;
        if (status === "approved") return <span style={{ fontSize: 13, color: "#3B82F6" }}>Approved — Scheduled</span>;
        return <span style={{ fontSize: 13, color: "#9CA3AF", fontStyle: "italic" }}>Creative coming soon</span>;
      };
      const rowBg = (status) => {
        if (status === "pending_review" || status === "changes_requested") return "#FDF2F4";
        return "#fff";
      };

      const renderContent = (p) => {
        const full = fullData[p.placementId];
        const isReview = p.status === "pending_review" || p.status === "changes_requested";
        const lastChange = full?.changeHistory?.length > 0 ? full.changeHistory[full.changeHistory.length - 1] : null;
        const showChanges = showChangeForm === p.placementId;

        return (
          <div style={{ maxWidth: 600, margin: "16px auto 0", paddingBottom: 8 }}>
            {/* Content: HTML iframe or Image */}
            {(full?.contentType === "html" && full?.htmlContent) ? (
              <div style={{ marginBottom: 12, position: "relative" }}>
                {p.version > 1 && <span style={{ position: "absolute", top: 8, right: 8, background: "#3B82F6", color: "#fff", fontSize: 11, fontWeight: 600, padding: "3px 8px", borderRadius: 6, zIndex: 1 }}>Updated v{p.version}</span>}
                <iframe sandbox="allow-scripts allow-popups allow-popups-to-navigate-user-activation" srcDoc={buildSrcdocHtml(full.htmlContent, p.placementId)} style={{ width: "100%", border: "1px solid #E5E7EB", borderRadius: 8, minHeight: 400, display: "block" }} data-placement-id={p.placementId} />
              </div>
            ) : full?.imageData ? (
              <div style={{ marginBottom: 12 }}>
                <ImageViewer src={full.imageData} style={{ width: "100%", maxWidth: 480 }}>
                  {p.version > 1 && <span style={{ position: "absolute", top: 8, right: 8, background: "#3B82F6", color: "#fff", fontSize: 11, fontWeight: 600, padding: "3px 8px", borderRadius: 6, zIndex: 1, pointerEvents: "none" }}>Updated v{p.version}</span>}
                </ImageViewer>
                {full.previewUrl && <a href={full.previewUrl} target="_blank" rel="noopener noreferrer" style={{ display: "inline-block", marginTop: 8, padding: "6px 12px", border: "1px solid #ddd", borderRadius: 6, fontSize: 13, color: "#666", textDecoration: "none", fontFamily: FONT }}>View Web Preview &#8599;</a>}
              </div>
            ) : (
              <div style={{ width: "100%", height: 200, background: "#F3F4F6", borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 12 }}>
                <span style={{ color: "#9CA3AF", fontSize: 13 }}>Loading content...</span>
              </div>
            )}

            {/* Resubmission note */}
            {p.version > 1 && lastChange?.message && (
              <div style={{ background: "#EFF6FF", border: "1px solid #BFDBFE", borderRadius: 8, padding: 12, marginBottom: 12, fontSize: 13 }}>
                <p style={{ color: "#3B82F6", fontWeight: 600, marginBottom: 4 }}>Updated based on your feedback</p>
                <p style={{ color: "#6B7280", fontStyle: "italic" }}>Your previous note: "{lastChange.message}"</p>
              </div>
            )}

            {/* Approve / Request Changes — only for review items */}
            {isReview && (
              <div>
                {confirmApprove === p.placementId ? (
                  <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                    <span style={{ fontSize: 14, color: "#374151" }}>Approve this placement?</span>
                    <button onClick={() => handleApprove(p.placementId)} disabled={approving === p.placementId} style={{ padding: "8px 20px", background: "#22C55E", color: "#fff", border: "none", borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: FONT }}>{approving === p.placementId ? "Approving..." : "Yes, Approve"}</button>
                    <button onClick={() => setConfirmApprove(null)} style={{ padding: "8px 16px", background: "none", border: "1px solid #D1D5DB", borderRadius: 8, fontSize: 14, color: "#6B7280", cursor: "pointer", fontFamily: FONT }}>Cancel</button>
                  </div>
                ) : (
                  <div style={{ display: "flex", gap: 10, flexDirection: isMobile ? "column" : "row" }}>
                    <button onClick={() => setConfirmApprove(p.placementId)} style={{ padding: "10px 24px", background: "#22C55E", color: "#fff", border: "none", borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: FONT }}>Approve &#10003;</button>
                    <button onClick={() => setShowChangeForm(showChanges ? null : p.placementId)} style={{ padding: "10px 24px", background: "none", border: "1px solid #6B7280", borderRadius: 8, fontSize: 14, color: "#374151", cursor: "pointer", fontFamily: FONT }}>Request Changes</button>
                  </div>
                )}
                {showChanges && (
                  <div style={{ marginTop: 16 }}>
                    <p style={{ fontSize: 14, fontWeight: 600, color: "#374151", marginBottom: 8 }}>What would you like changed?</p>
                    <textarea value={changeFeedback[p.placementId] || ""} onChange={e => setChangeFeedback(f => ({ ...f, [p.placementId]: e.target.value }))} placeholder="Describe the changes needed" rows={3} style={{ width: "100%", padding: 12, borderRadius: 8, border: "1px solid #D1D5DB", fontFamily: FONT, fontSize: 14, resize: "vertical", color: "#111827" }} />
                    <button onClick={() => handleRequestChanges(p.placementId)} disabled={submittingChange === p.placementId || !(changeFeedback[p.placementId] || "").trim()} style={{ marginTop: 8, padding: "10px 20px", background: "#E8909C", color: "#fff", border: "none", borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: FONT, opacity: (changeFeedback[p.placementId] || "").trim() ? 1 : 0.5 }}>{submittingChange === p.placementId ? "Submitting..." : "Submit Feedback"}</button>
                  </div>
                )}
              </div>
            )}
          </div>
        );
      };

      return (
        <div>
          {/* Toast */}
          {toast && <div className="fade-in" style={{ position: "fixed", top: 24, right: 24, background: "#22C55E", color: "#fff", padding: "10px 20px", borderRadius: 8, fontSize: 14, fontWeight: 600, zIndex: 300, boxShadow: "0 4px 12px rgba(0,0,0,0.15)" }}>{toast}</div>}

          {/* Campaign Selector */}
          {showCampaignSelector && (
            <div style={{ display: "flex", gap: 8, marginBottom: 20, overflowX: "auto", paddingBottom: 4 }}>
              <button onClick={() => setSelectedCampaign("all")} style={{ padding: "6px 16px", borderRadius: 20, border: `1px solid ${selectedCampaign === "all" ? "#E8909C" : "#D1D5DB"}`, background: selectedCampaign === "all" ? "#FDF2F4" : "#fff", color: selectedCampaign === "all" ? "#E8909C" : "#6B7280", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: FONT, whiteSpace: "nowrap" }}>All Campaigns</button>
              {campaignList.map(c => (
                <button key={c.contractId} onClick={() => setSelectedCampaign(c.contractId)} style={{ padding: "6px 16px", borderRadius: 20, border: `1px solid ${selectedCampaign === c.contractId ? "#E8909C" : "#D1D5DB"}`, background: selectedCampaign === c.contractId ? "#FDF2F4" : "#fff", color: selectedCampaign === c.contractId ? "#E8909C" : "#6B7280", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: FONT, whiteSpace: "nowrap" }}>{c.name} ({c.totalRuns} runs)</button>
              ))}
            </div>
          )}

          {/* Action Banner */}
          {needsReview.length > 0 && (
            <div style={{ background: "#FDF2F4", borderLeft: "3px solid #E8909C", borderRadius: 8, padding: "12px 16px", marginBottom: 20, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <span style={{ fontSize: 14, fontWeight: 600, color: "#111827" }}>{needsReview.length} placement{needsReview.length !== 1 ? "s" : ""} need{needsReview.length === 1 ? "s" : ""} your review</span>
              <a href="#" onClick={e => { e.preventDefault(); const el = document.querySelector("[data-review-row]"); if (el) el.scrollIntoView({ behavior: "smooth", block: "center" }); }} style={{ fontSize: 13, color: "#E8909C", fontWeight: 600, textDecoration: "none", fontFamily: FONT }}>Review Now ↓</a>
            </div>
          )}

          {/* Campaign Progress Summary */}
          {(selectedCampaign === "all" ? campaignList : campaignList.filter(c => c.contractId === selectedCampaign)).map(c => {
            const items = placements.filter(p => p.contractId === c.contractId);
            const prog = getProgress(items);
            const total = c.totalRuns || items.length;
            const completedCount = prog.completed;
            const pct = total > 0 ? Math.round((completedCount / total) * 100) : 0;
            return (
              <div key={c.contractId} style={{ background: "#fff", border: "1px solid #E5E7EB", borderRadius: 10, padding: 16, marginBottom: 16 }}>
                <p style={{ fontSize: 16, fontWeight: 700, color: "#111827", marginBottom: 8 }}>{c.name}</p>
                <div style={{ height: 6, background: "#F3F4F6", borderRadius: 3, marginBottom: 8, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: pct + "%", background: "#22C55E", borderRadius: 3, transition: "width 0.3s" }} />
                </div>
                <p style={{ fontSize: 13, color: "#6B7280" }}>
                  {completedCount} of {total} completed
                  {prog.approved > 0 && <span> · {prog.approved} approved</span>}
                  {(prog.pending_review + prog.changes_requested) > 0 && <span> · {prog.pending_review + prog.changes_requested} needs review</span>}
                  {prog.placeholder > 0 && <span> · {prog.placeholder} remaining</span>}
                </p>
              </div>
            );
          })}

          {/* Timeline */}
          <div style={{ position: "relative", paddingLeft: isMobile ? 0 : 36 }}>
            {/* Vertical line */}
            {!isMobile && filtered.length > 1 && (
              <div style={{ position: "absolute", left: 11, top: 12, bottom: 12, width: 1, background: "#E5E7EB" }} />
            )}

            {filtered.map((p, idx) => {
              const isReview = p.status === "pending_review" || p.status === "changes_requested";
              const isPlaceholder = p.status === "placeholder";
              const isExp = !!expanded[p.placementId];
              const canExpand = !isPlaceholder;
              const runLabel = p.runNumber ? `Run ${p.runNumber}${p.totalRuns ? ` of ${p.totalRuns}` : ""}` : (p.headline || "Untitled");

              return (
                <div key={p.placementId} data-review-row={isReview ? "true" : undefined} style={{ position: "relative", marginBottom: 2 }}>
                  {/* Row header */}
                  <div
                    onClick={() => canExpand && toggleExpand(p.placementId)}
                    style={{
                      display: "flex", alignItems: "center", gap: isMobile ? 10 : 12, padding: isMobile ? "12px 12px" : "12px 16px",
                      background: rowBg(p.status), borderRadius: 8, cursor: canExpand ? "pointer" : "default",
                      border: isReview ? "1px solid rgba(232,144,156,0.3)" : "1px solid transparent",
                      transition: "background 0.15s",
                    }}
                    onMouseEnter={e => { if (canExpand) e.currentTarget.style.background = isReview ? "#FBEAED" : "#F9FAFB"; }}
                    onMouseLeave={e => { e.currentTarget.style.background = rowBg(p.status); }}
                  >
                    {!isMobile && <div style={{ position: "absolute", left: -36, top: "50%", transform: "translateY(-50%)" }}>{rowIcon(p.status)}</div>}
                    {isMobile && rowIcon(p.status)}
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 14, fontWeight: 600, color: isPlaceholder ? "#9CA3AF" : "#111827" }}>{runLabel}</span>
                        <span style={{ fontSize: 12, color: "#9CA3AF" }}>·</span>
                        <span style={{ fontSize: 13, color: "#6B7280" }}>{fmtD(p.scheduledDate)}</span>
                        <span style={{ fontSize: 12, color: "#9CA3AF" }}>·</span>
                        {rowLabel(p.status)}
                        {p.version > 1 && <span style={{ fontSize: 10, padding: "2px 6px", borderRadius: 4, background: "rgba(59,130,246,0.15)", color: "#3B82F6", fontWeight: 600 }}>v{p.version}</span>}
                      </div>
                      {p.campaignName && !p.runNumber && <p style={{ fontSize: 12, color: "#9CA3AF", marginTop: 2 }}>{p.campaignName}</p>}
                    </div>
                    {canExpand && (
                      <span style={{ fontSize: 12, color: "#9CA3AF", flexShrink: 0 }}>{isExp ? "▲" : "▼"}</span>
                    )}
                  </div>

                  {/* Expanded content */}
                  {isExp && canExpand && (
                    <div style={{ padding: isMobile ? "0 12px 12px" : "0 16px 16px", background: rowBg(p.status), borderRadius: "0 0 8px 8px", marginTop: -2 }}>
                      {renderContent(p)}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Bottom contact */}
          <p style={{ textAlign: "center", fontSize: 13, color: "#9CA3AF", marginTop: 32, lineHeight: 1.6 }}>
            Questions about your placements? Reach out to Danielle at <a href="mailto:danielle@themommy.news" style={{ color: "#E8909C", textDecoration: "none" }}>danielle@themommy.news</a>
          </p>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // SPONSOR POLL PICKER (sponsor-facing)
    // ═══════════════════════════════════════════════════════════════
    function SponsorPollPicker({ shareToken, contract, isMobile }) {
      const [entitlements, setEntitlements] = useState(null);
      const [availableDates, setAvailableDates] = useState([]);
      const [loading, setLoading] = useState(true);
      const [selectedDate, setSelectedDate] = useState(null);
      const [pollQuestion, setPollQuestion] = useState("");
      const [pollOptions, setPollOptions] = useState("");
      const [isCustom, setIsCustom] = useState(false);
      const [claiming, setClaiming] = useState(false);
      const [locking, setLocking] = useState(false);
      const [confirmLock, setConfirmLock] = useState(null);
      const [error, setError] = useState(null);

      const fetchData = async () => {
        try {
          const [entRes, datesRes] = await Promise.all([
            fetch(`/api/sponsor-polls?action=entitlements&token=${shareToken}`),
            fetch(`/api/sponsor-polls?action=available-dates&token=${shareToken}`),
          ]);
          if (entRes.ok) setEntitlements(await entRes.json());
          if (datesRes.ok) {
            const d = await datesRes.json();
            setAvailableDates(d.dates || []);
          }
        } catch {}
        setLoading(false);
      };

      useEffect(() => { fetchData(); }, []);

      if (loading) return null;
      if (!entitlements || entitlements.pollsIncluded === 0) return null;

      const handleClaim = async () => {
        if (!selectedDate) return;
        setClaiming(true);
        setError(null);
        try {
          const opts = pollOptions.split(",").map(o => o.trim()).filter(Boolean);
          const res = await fetch(`/api/sponsor-polls?action=claim&token=${shareToken}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ date: selectedDate, pollQuestion: pollQuestion.trim() || null, pollOptions: opts.length > 0 ? opts : null, isCustomQuestion: isCustom }),
          });
          if (res.ok) {
            setSelectedDate(null);
            setPollQuestion("");
            setPollOptions("");
            setIsCustom(false);
            await fetchData();
          } else {
            const d = await res.json();
            setError(d.error || "Failed to claim slot");
          }
        } catch { setError("Network error"); }
        setClaiming(false);
      };

      const handleLock = async (date) => {
        setLocking(true);
        try {
          const res = await fetch(`/api/sponsor-polls?action=lock&token=${shareToken}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ date }),
          });
          if (res.ok) { setConfirmLock(null); await fetchData(); }
        } catch {}
        setLocking(false);
      };

      const tierLabel = { starter: "Starter", growth: "Growth", partner: "Partner", custom: "Custom" };

      // Group available dates by quarter
      const datesByQuarter = {};
      for (const d of availableDates) {
        if (!datesByQuarter[d.quarter]) datesByQuarter[d.quarter] = [];
        datesByQuarter[d.quarter].push(d);
      }

      return (
        <div style={{ marginTop: isMobile ? 40 : 56, paddingTop: 24, borderTop: `1px solid ${C.border}` }}>
          <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 16 }}>Your Custom Audience Polls</h2>
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: isMobile ? 16 : 24, marginBottom: 24 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8, marginBottom: 12 }}>
              <span style={{ fontSize: 14, fontWeight: 600 }}>Package: {tierLabel[entitlements.tier] || entitlements.tier} — {entitlements.pollsIncluded} poll{entitlements.pollsIncluded !== 1 ? "s" : ""} included</span>
            </div>
            <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 8 }}>
              <span style={{ fontSize: 13, color: C.muted }}>Used: {entitlements.used} of {entitlements.pollsIncluded}</span>
              <span style={{ fontSize: 13, color: entitlements.remaining > 0 ? C.green : C.dim }}>Remaining: {entitlements.remaining}</span>
            </div>
            <p style={{ fontSize: 12, color: C.dim }}>Quarterly limit: 1 poll per quarter</p>
          </div>

          {/* Existing selections */}
          {entitlements.slots && entitlements.slots.length > 0 && (
            <div style={{ marginBottom: 24 }}>
              {entitlements.slots.map((slot, i) => (
                <div key={i} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "14px 18px", marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                  <div>
                    <span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{slot.date ? new Date(slot.date + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "?"}</span>
                    {slot.pollQuestion && <span style={{ fontSize: 12, color: C.muted, marginLeft: 8 }}>— "{slot.pollQuestion}"</span>}
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    {slot.status === "locked" && <span style={{ fontSize: 12, color: C.green, fontWeight: 600 }}>🔒 Locked</span>}
                    {slot.status === "pending" && (
                      <>
                        <span style={{ fontSize: 12, color: C.amber, fontWeight: 600 }}>⏳ Pending</span>
                        <Btn onClick={() => setConfirmLock(slot.date)} color={C.white} bg={C.green} small>Lock This Date</Btn>
                      </>
                    )}
                    {slot.isCustomQuestion && slot.customQuestionApproved === null && <span style={{ fontSize: 11, color: C.amber }}>Pending Approval</span>}
                    {slot.isCustomQuestion && slot.customQuestionApproved === false && <span style={{ fontSize: 11, color: C.red }}>Question not approved — please resubmit</span>}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Lock confirmation modal */}
          {confirmLock && (
            <Overlay onClose={() => setConfirmLock(null)}>
              <div>
                <h3 style={{ fontSize: 18, fontWeight: 700, marginBottom: 12 }}>Lock This Date?</h3>
                <p style={{ fontSize: 13, color: C.muted, marginBottom: 20, lineHeight: 1.6 }}>Once locked, poll dates can only be changed by The Mommy team. Contact us if you need to make changes.</p>
                <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
                  <Btn onClick={() => setConfirmLock(null)} color={C.muted} bg="transparent" style={{ border: `1px solid ${C.border}` }}>Cancel</Btn>
                  <Btn onClick={() => handleLock(confirmLock)} color={C.white} bg={C.green} disabled={locking}>{locking ? "Locking..." : "Confirm Lock"}</Btn>
                </div>
              </div>
            </Overlay>
          )}

          {/* Date browser */}
          {entitlements.remaining > 0 && (
            <div>
              <h3 style={{ fontSize: 15, fontWeight: 600, color: C.muted, marginBottom: 16 }}>Select a Date for Your Next Poll</h3>
              {Object.entries(datesByQuarter).map(([quarter, dates]) => {
                const quarterUsed = dates[0]?.quarterUsed || 0;
                const isQuarterFull = quarterUsed >= 1;
                return (
                  <div key={quarter} style={{ marginBottom: 20 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                      <span style={{ fontSize: 13, fontWeight: 600, color: isQuarterFull ? C.dim : C.text }}>{quarter}</span>
                      {isQuarterFull && <span style={{ fontSize: 11, color: C.dim, fontStyle: "italic" }}>— slot used</span>}
                    </div>
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                      {dates.map(d => {
                        const dateObj = new Date(d.date + "T00:00:00");
                        const label = dateObj.toLocaleDateString("en-US", { month: "short", day: "numeric", weekday: "short" });
                        const isSelected = selectedDate === d.date;
                        return (
                          <button key={d.date} onClick={() => d.available ? setSelectedDate(isSelected ? null : d.date) : null}
                            disabled={!d.available}
                            style={{
                              padding: "8px 14px", borderRadius: 8, fontSize: 12, fontWeight: 600, fontFamily: FONT,
                              cursor: d.available ? "pointer" : "not-allowed",
                              border: isSelected ? `2px solid ${C.accent}` : `1px solid ${C.border}`,
                              background: isSelected ? C.accentDim : d.available ? C.card : C.bg,
                              color: d.available ? (isSelected ? C.accent : C.text) : C.dim,
                              opacity: d.available ? 1 : 0.4,
                              transition: "all 0.15s",
                            }}>
                            {label}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              })}

              {/* Selection panel */}
              {selectedDate && (
                <div style={{ background: C.card, border: `1px solid ${C.accent}`, borderRadius: 14, padding: isMobile ? 16 : 24, marginTop: 16 }}>
                  <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 16 }}>Select your poll for {new Date(selectedDate + "T00:00:00").toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" })}</h3>

                  <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                    <button onClick={() => setIsCustom(false)} style={{ padding: "8px 18px", borderRadius: 8, fontSize: 13, fontWeight: 600, border: "none", cursor: "pointer", background: !isCustom ? C.accent : C.bg, color: !isCustom ? C.white : C.muted }}>From Library</button>
                    <button onClick={() => setIsCustom(true)} style={{ padding: "8px 18px", borderRadius: 8, fontSize: 13, fontWeight: 600, border: "none", cursor: "pointer", background: isCustom ? C.accent : C.bg, color: isCustom ? C.white : C.muted }}>Custom Question</button>
                  </div>

                  {!isCustom && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 200, overflowY: "auto", marginBottom: 16 }}>
                      {["Where do you shop for kids' clothes?", "What's your favorite family vacation type?", "How do you handle screen time for your kids?", "What's your biggest parenting challenge right now?", "How do you meal plan for your family?"].map(q => (
                        <button key={q} onClick={() => setPollQuestion(q)} style={{
                          textAlign: "left", padding: "10px 14px", borderRadius: 8,
                          background: pollQuestion === q ? C.accentDim : C.bg,
                          border: `1px solid ${pollQuestion === q ? C.accent : C.border}`,
                          color: pollQuestion === q ? C.accent : C.text,
                          cursor: "pointer", fontSize: 13, fontFamily: FONT, transition: "all 0.15s",
                        }}>
                          {q}
                        </button>
                      ))}
                    </div>
                  )}

                  {isCustom && (
                    <div style={{ marginBottom: 16 }}>
                      <Input label="Your Question" value={pollQuestion} onChange={e => setPollQuestion(e.target.value)} placeholder="e.g. What's your morning routine?" />
                      <Input label="Options (comma-separated, 2-4)" value={pollOptions} onChange={e => setPollOptions(e.target.value)} placeholder="Option A, Option B, Option C" />
                      <p style={{ fontSize: 11, color: C.dim }}>Custom questions are submitted for approval by The Mommy team.</p>
                    </div>
                  )}

                  {error && <p style={{ fontSize: 13, color: C.red, marginBottom: 12 }}>{error}</p>}

                  <Btn onClick={handleClaim} color={C.white} bg={C.accent} disabled={claiming || !pollQuestion.trim()} style={{ width: "100%", padding: 14, fontSize: 15 }}>
                    {claiming ? "Confirming..." : "Confirm Poll Selection"}
                  </Btn>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    function SponsorView({ sponsor, runs, totals, contract, costMetrics, onBack, onQuickSync, config, allContracts, allRuns, isDemo, shareToken }) {
      const TABS = [
        { id: "performance", label: "Performance" },
        { id: "polls", label: "Polls" },
        { id: "placements", label: "Placements" },
        { id: "reports", label: "Reports" },
      ];
      const urlTab = new URLSearchParams(window.location.search).get("tab");
      const [activeTab, setActiveTab] = useState(TABS.find(t => t.id === urlTab) ? urlTab : "performance");
      const switchTab = (tabId) => {
        setActiveTab(tabId);
        const u = new URL(window.location);
        if (tabId === "performance") u.searchParams.delete("tab");
        else u.searchParams.set("tab", tabId);
        window.history.replaceState({}, "", u);
      };
      const [showPdfModal, setShowPdfModal] = useState(false);
      const [pdfIncludeCpm, setPdfIncludeCpm] = useState(true);
      const [pdfIncludeCpc, setPdfIncludeCpc] = useState(true);
      useEffect(() => {
        const onKey = (e) => { if (e.key === "Escape") setShowPdfModal(false); };
        document.addEventListener("keydown", onKey);
        return () => document.removeEventListener("keydown", onKey);
      }, []);
      const width = useWindowWidth();
      const isMobile = width <= MOBILE;
      const [lastChecked, setLastChecked] = useState(new Date().toISOString());
      const [, setTick] = useState(0);
      useEffect(() => {
        if (isDemo) return;
        const doCheck = () => { onQuickSync(); setLastChecked(new Date().toISOString()); };
        doCheck();
        const syncInterval = setInterval(doCheck, 5 * 60 * 1000);
        const tickInterval = setInterval(() => setTick(t => t + 1), 60 * 1000);
        return () => { clearInterval(syncInterval); clearInterval(tickInterval); };
      }, []);

      // Fetch placement review count for tab badge
      const [placementReviewCount, setPlacementReviewCount] = useState(0);
      useEffect(() => {
        if (!shareToken || isDemo || onBack) return;
        fetch(`/api/sponsor-placements?action=list&token=${shareToken}`)
          .then(r => r.ok ? r.json() : [])
          .then(items => setPlacementReviewCount((items || []).filter(i => i.status === "pending_review").length))
          .catch(() => {});
      }, [shareToken, activeTab]);

      // ─── View selector logic ────────────────────────────────────
      const unassigned = allContracts ? (allRuns || []).filter(r => !r.contractId || !allContracts.find(c => c.id === r.contractId)) : [];
      const viewOptions = allContracts ? buildViewOptions(allContracts, unassigned, allRuns || []) : [];
      const showSelector = viewOptions.length >= 2;
      const defaultViewId = viewOptions.find(o => o.isActive)?.id || viewOptions[0]?.id || null;
      const [selectedView, setSelectedView] = useState(defaultViewId);

      const viewData = allContracts && selectedView ? getViewData(selectedView, allContracts, unassigned, allRuns || []) : null;

      // Use view data if selector is active, otherwise fall back to props
      const vRuns = viewData ? viewData.runs.sort((a, b) => new Date(b.sendDate) - new Date(a.sendDate)) : runs;
      const vContract = viewData ? viewData.contract : contract;
      const vTot = viewData ? (() => {
        const o = vRuns.reduce((s, r) => s + (r.totalOpens || 0), 0);
        const c = vRuns.reduce((s, r) => s + (getRunClicks(r) || r.totalClicks || 0), 0);
        return { opens: o, clicks: c, ctr: o > 0 ? (c / o) * 100 : 0 };
      })() : totals;
      const vShowProgress = viewData ? viewData.showProgress : true;
      const vShowCost = viewData ? viewData.showCost : true;
      const vShowTerms = viewData ? viewData.showTerms : true;
      const isAllTime = selectedView === "__all__";
      const isOneOff = selectedView === "__unassigned__";

      // ─── Cost metric visibility (sponsor-level master + per-contract flags) ──
      const sponsorCostEnabled = sponsor.showCostToSponsor ?? false;
      let showCpm, showCpc, activeCostMetrics;
      if (vContract) {
        showCpm = sponsorCostEnabled && (vContract.showCpmToSponsor ?? vContract.showPricingToSponsor ?? false);
        showCpc = sponsorCostEnabled && (vContract.showCpcToSponsor ?? vContract.showPricingToSponsor ?? false);
        activeCostMetrics = vContract.costMetrics || costMetrics;
      } else if (allContracts && sponsorCostEnabled && (isAllTime || isOneOff)) {
        const contractCpm = allContracts.some(c => c.showCpmToSponsor ?? c.showPricingToSponsor ?? false);
        const contractCpc = allContracts.some(c => c.showCpcToSponsor ?? c.showPricingToSponsor ?? false);
        const oneOffCpm = sponsor.oneOffShowCpm ?? false;
        const oneOffCpc = sponsor.oneOffShowCpc ?? false;
        showCpm = isOneOff ? oneOffCpm : (contractCpm || oneOffCpm);
        showCpc = isOneOff ? oneOffCpc : (contractCpc || oneOffCpc);
        activeCostMetrics = calcAggregateCost(selectedView, allContracts, unassigned, vRuns, showCpm, showCpc);
      } else {
        showCpm = false; showCpc = false; activeCostMetrics = null;
      }
      const hasAnyCost = vShowCost && (showCpm || showCpc) && activeCostMetrics;
      const terms = vShowTerms && vContract ? getTerms(vContract) : [];
      const updatedText = `Updated ${timeAgo(lastChecked)}`;

      const handleDownloadClick = () => {
        const hasCpm = showCpm && activeCostMetrics?.cpm;
        const hasCpc = showCpc && activeCostMetrics?.cpc;
        if (hasCpm || hasCpc) {
          setPdfIncludeCpm(true);
          setPdfIncludeCpc(true);
          setShowPdfModal(true);
        } else {
          downloadReport({ sponsor, contract: vContract, runs: vRuns, totals: vTot, costMetrics: activeCostMetrics, config, includeCpm: false, includeCpc: false });
        }
      };
      const handleDownloadConfirm = () => {
        setShowPdfModal(false);
        downloadReport({ sponsor, contract: vContract, runs: vRuns, totals: vTot, costMetrics: activeCostMetrics, config, includeCpm: pdfIncludeCpm, includeCpc: pdfIncludeCpc });
      };

      const m$ = (v) => "$" + (v || 0).toFixed(2);

      return (
        <div style={{ minHeight: "100vh" }}>
          {showPdfModal && (
            <div onClick={() => setShowPdfModal(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.65)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200 }}>
              <div onClick={e => e.stopPropagation()} className="fade-in" style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: isMobile ? 14 : 18, padding: isMobile ? 20 : 32, width: 360, maxWidth: "92vw" }}>
                <p style={{ fontSize: 18, fontWeight: 700, marginBottom: 20 }}>Download Report</p>
                {showCpm && activeCostMetrics?.cpm != null && (
                  <label onClick={() => setPdfIncludeCpm(!pdfIncludeCpm)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", borderRadius: 8, background: C.bg, border: `1px solid ${C.border}`, cursor: "pointer", marginBottom: 8 }}>
                    <div style={{ width: 20, height: 20, borderRadius: 5, border: `2px solid ${pdfIncludeCpm ? C.accent : C.dim}`, background: pdfIncludeCpm ? C.accent : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all 0.15s" }}>
                      {pdfIncludeCpm && <span style={{ color: "#fff", fontSize: 13, fontWeight: 700, lineHeight: 1 }}>✓</span>}
                    </div>
                    <span style={{ fontSize: 14 }}>Include CPM <span style={{ color: C.muted, fontFamily: MONO }}>({m$(activeCostMetrics.cpm)})</span></span>
                  </label>
                )}
                {showCpc && activeCostMetrics?.cpc != null && (
                  <label onClick={() => setPdfIncludeCpc(!pdfIncludeCpc)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", borderRadius: 8, background: C.bg, border: `1px solid ${C.border}`, cursor: "pointer", marginBottom: 8 }}>
                    <div style={{ width: 20, height: 20, borderRadius: 5, border: `2px solid ${pdfIncludeCpc ? C.accent : C.dim}`, background: pdfIncludeCpc ? C.accent : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all 0.15s" }}>
                      {pdfIncludeCpc && <span style={{ color: "#fff", fontSize: 13, fontWeight: 700, lineHeight: 1 }}>✓</span>}
                    </div>
                    <span style={{ fontSize: 14 }}>Include CPC <span style={{ color: C.muted, fontFamily: MONO }}>({m$(activeCostMetrics.cpc)})</span></span>
                  </label>
                )}

    function ProgressBar({ current, total }) {
      const pctVal = total > 0 ? Math.min((current / total) * 100, 100) : 0;
      const remaining = total - current;
      const barColor = remaining <= 0 ? C.red : remaining === 1 ? C.amber : C.green;
      return (
        <div style={{ marginBottom: 32, background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px 20px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{current} of {total} emails sent</span>
            <span style={{ fontSize: 12, color: C.dim }}>{remaining > 0 ? `${remaining} remaining` : "Complete"}</span>
          </div>
          <div style={{ height: 6, background: C.bg, borderRadius: 3, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${pctVal}%`, background: barColor, borderRadius: 3, transition: "width 0.3s" }} />
          </div>
        </div>
      );
    }

    function TermsBadges({ contract, style = {} }) {
      const terms = getTerms(contract);
      if (terms.length === 0) return null;
      return (
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", ...style }}>

            <span key={i} style={{ padding: "6px 14px", borderRadius: 20, background: C.purpleDim, border: "1px solid rgba(167,139,250,0.25)", color: C.purple, fontSize: 12, fontWeight: 600, letterSpacing: 0.5 }}>✦ {t}</span>
          ))}
        </div>
      );
    }

    function buildChartData(runs) {
      const sorted = [...runs].filter(r => r.sendDate).sort((a, b) => new Date(a.sendDate) - new Date(b.sendDate));
      if (sorted.length === 0) return [];
      const points = [];
      let cumulative = 0;
      sorted.forEach((run, i) => {
        const runOpens = run.totalOpens || 0;
        const runDate = new Date(run.sendDate);
        if (i === 0) {
          const preDate = new Date(runDate);
          preDate.setDate(preDate.getDate() - 3);
          points.push({ date: preDate, total: 0, isSend: false, label: null });
        }
        if (i > 0) {
          const prevDate = new Date(sorted[i - 1].sendDate);
          const daysBetween = Math.round((runDate - prevDate) / (1000 * 60 * 60 * 24));
          const prevTotal = cumulative;
          for (let d = 1; d < daysBetween; d++) {
            const t = d / daysBetween;
            const eased = 1 - Math.pow(1 - t, 2);
            const interpDate = new Date(prevDate);
            interpDate.setDate(interpDate.getDate() + d);
            points.push({ date: interpDate, total: Math.round(prevTotal + (runOpens * eased * 0.3)), isSend: false, label: null });
          }
        }
        cumulative += runOpens;
        points.push({ date: runDate, total: cumulative, isSend: true, label: run.emailName });
      });
      const today = new Date();
      const lastSend = new Date(sorted[sorted.length - 1].sendDate);
      if (today > lastSend) {
        const daysSince = Math.round((today - lastSend) / (1000 * 60 * 60 * 24));
        for (let d = 1; d <= Math.min(daysSince, 7); d++) {
          const postDate = new Date(lastSend);
          postDate.setDate(postDate.getDate() + d);
          points.push({ date: postDate, total: cumulative, isSend: false, label: null });
        }
      }
      return points;
    }

    function buildReportHTML({ sponsor, contract, runs, totals, costMetrics, config, includeCpm = true, includeCpc = true }) {
      const P = { bg: "#FFFFFF", text: "#1A1A2E", muted: "#6B7280", border: "#E5E7EB", card: "#F9FAFB", blue: "#2563EB", green: "#059669", amber: "#D97706", purple: "#7C3AED" };

      const p = (v) => (v || 0).toFixed(2) + "%";

      const fd = (d) => { if (!d) return "—"; return new Date(d).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }); };

      const showCpm = includeCpm && costMetrics?.cpm != null;
      const showCpc = includeCpc && costMetrics?.cpc != null;
      const hasAnyCost = (showCpm || showCpc) && costMetrics;
      const terms = contract ? getTerms(contract) : [];

      const totalOpens = runs.reduce((s, r) => s + (r.totalOpens || 0), 0);

      // Metric card helper
      const mc = (label, value, color) => `<div style="flex:1;border:1px solid ${P.border};border-radius:10px;padding:16px 12px;text-align:center;background:${P.card}">
